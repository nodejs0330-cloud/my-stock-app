<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NCS SURVIVE - {{ username }}님</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #111;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            touch-action: none;
        }
        #game-container {
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>
    <div id="game-container"></div>

    <script>
        // PC / 모바일 판별
        const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent) || window.innerWidth < 768;
        const GAME_WIDTH = isMobile ? 720 : 1280;
        const GAME_HEIGHT = isMobile ? 1280 : 720;

        let isMuted = false;
        let globalBGM = null;

        // 원칙 3: BGM 단일 선언 (중복 재생 방지 조건문 준수)
        function playBGM(scene, key) {
            if (globalBGM && globalBGM.key === key && globalBGM.isPlaying) {
                return; 
            }
            if (globalBGM) {
                globalBGM.stop();
                globalBGM.destroy();
            }
            if (scene.cache.audio.exists(key)) {
                globalBGM = scene.sound.add(key, { loop: true, volume: 0.5 });
                if (!isMuted) globalBGM.play();
            }
        }

        // 원칙 1: 미래 구현용 몬스터/보스 SFX 레지스터 보존
        const MONSTER_SFX_REGISTRY = {
            boss_platypus_attack: ['boss_platypus_attack1', 'boss_platypus_attack2'],
            boss_thunder_strike:  ['boss_thunder_strike1',  'boss_thunder_strike2'],
            boss_armadillo_guard: ['boss_armadillo_guard1', 'boss_armadillo_guard2'],
            boss_panda_storm:     ['boss_panda_storm1',     'boss_panda_storm2'],
            boss_dragon_roar:     ['boss_dragon_roar1',     'boss_dragon_roar2'],
            boss_dragon_breath:   ['boss_dragon_breath1',   'boss_dragon_breath2'],
            skeleton_hit:         ['skeleton_hit1',         'skeleton_hit2'],
            bat_hit:              ['bat_hit1',              'bat_hit2'],
            goblin_attack:        ['goblin_attack1',        'goblin_attack2'],
            demon_hit:            ['demon_hit1',            'demon_hit2'],
            spider_hit:           ['spider_hit1',           'spider_hit2']
        };

        class MonsterSoundManager {
            static play(scene, key) {
                if (isMuted || !MONSTER_SFX_REGISTRY[key]) return;
                const candidates = MONSTER_SFX_REGISTRY[key];
                const selectedKey = candidates[Math.floor(Math.random() * candidates.length)];
                
                if (scene.cache.audio.exists(selectedKey)) {
                    scene.sound.play(selectedKey, { volume: 0.6 });
                } else if (scene.cache.audio.exists(candidates[0])) {
                    scene.sound.play(candidates[0], { volume: 0.6 });
                }
            }
        }

        // 원칙 4: SFX 랜덤 호출 헬퍼
        function playRandomSFX(scene, baseKey, volume = 0.5) {
            if (isMuted) return;
            let num = Math.random() < 0.5 ? '1' : '2';
            let key = baseKey + num;
            
            if (scene.cache.audio.exists(key)) {
                scene.sound.play(key, { volume: volume });
            } else if (scene.cache.audio.exists(baseKey + '1')) {
                scene.sound.play(baseKey + '1', { volume: volume });
            }
        }

        function createMuteButton(scene) {
            let muteBtn = scene.add.text(scene.scale.width - 40, 68, isMuted ? '🔇' : '🔊', { fontSize: '32px' })
                .setOrigin(0.5)
                .setScrollFactor(0)
                .setDepth(10000)
                .setInteractive();

            muteBtn.on('pointerdown', () => {
                playRandomSFX(scene, 'button');
                isMuted = !isMuted;
                scene.sound.mute = isMuted;
                muteBtn.setText(isMuted ? '🔇' : '🔊');
                if (globalBGM) {
                    isMuted ? globalBGM.pause() : globalBGM.resume();
                }
            });
            return muteBtn;
        }

        // ==========================================
        // 0. Preload Scene (원칙 1: 리소스 흔적 보존)
        // ==========================================
        class PreloadScene extends Phaser.Scene {
            constructor() { super({ key: 'PreloadScene' }); }

            preload() {
                this.add.text(this.scale.width / 2, this.scale.height / 2, '로딩 중...', { fontSize: '32px', fill: '#fff' }).setOrigin(0.5);

                this.load.image('main_bg', '/static/img/survive/main.png');
                this.load.image('game_start', '/static/img/survive/game_start.png');
                this.load.image('game_upgrade', '/static/img/survive/game_upgrade.png');
                this.load.image('boss_sli0', '/static/img/survive/monster/sli/boss_sli0.png');

                // BGM 로드
                this.load.audio('survive_main', '/static/bgm/survive/survive_main.mp3');
                for (let i = 1; i <= 6; i++) {
                    this.load.audio(`stage${i}`, `/static/bgm/survive/stage${i}.mp3`);
                }
                this.load.audio('final_boss', '/static/bgm/survive/final_boss.mp3');

                // SFX 로드
                this.load.audio('button1', '/static/sfx/survive/button1.mp3');
                this.load.audio('button2', '/static/sfx/survive/button2.mp3');

                const sfxKeys = ['footstep', 'suri_throw', 'hit_impact', 'skill_fire', 'skill_water', 'skill_wind', 'skill_bomb', 'level_up', 'pickup', 'boss_warning', 'game_over', 'button'];
                sfxKeys.forEach(key => {
                    this.load.audio(`${key}1`, `/static/sfx/survive/${key}1.mp3`);
                    this.load.audio(`${key}2`, `/static/sfx/survive/${key}2.mp3`);
                });

                Object.keys(MONSTER_SFX_REGISTRY).forEach(key => {
                    this.load.audio(`${key}1`, `/static/sfx/survive/${key}1.mp3`);
                    this.load.audio(`${key}2`, `/static/sfx/survive/${key}2.mp3`);
                });

                this.load.image('hero_1', '/static/img/survive/hero/hero_1.png');
                this.load.image('hero_2', '/static/img/survive/hero/hero_2.png');
                this.load.image('hero_3', '/static/img/survive/hero/hero_3.png');
                this.load.image('hero_4', '/static/img/survive/hero/hero_4.png');

                this.load.image('suri', '/static/img/survive/eqi/suri.png');
                this.load.image('suri_vfx', '/static/img/survive/effect/suri_throw_vfx.png');
                this.load.image('fire_stream', '/static/img/survive/reword/fire_stream.png');
                this.load.image('water_dragon', '/static/img/survive/reword/water_dragon.png');
                this.load.image('rasenshuriken', '/static/img/survive/reword/rasenshuriken.png');
                this.load.image('explosive_shuriken', '/static/img/survive/reword/explosive_shuriken.png');
                this.load.image('explosion_vfx', '/static/img/survive/reword/explosion_vfx.png');

                // 신규 스킬: 토둔 및 아이템 이미지 로드
                this.load.image('earth_wall', '/static/img/survive/reword/earth_wall.png');
                this.load.image('scroll_earth_wall', '/static/img/survive/reword/scroll_earth_wall.png');
                this.load.image('ninja_posion', '/static/img/survive/reword/ninja_posion.png');
                this.load.image('meat', '/static/img/survive/reword/meat.png');
                this.load.image('field_magnet', '/static/img/survive/reword/magnet.png');

                this.load.image('sli_drop1', '/static/img/survive/monster/sli/sli_drop1.png');
                this.load.image('sli_drop3', '/static/img/survive/monster/sli/sli_drop3.png');

                // 상자 및 스크롤 이미지 로드
                this.load.image('box', '/static/img/survive/reword/box.png');
                this.load.image('rare_box', '/static/img/survive/reword/rare_box.png');
                this.load.image('scroll_fire_stream', '/static/img/survive/reword/scroll_fire_stream.png');
                this.load.image('scroll_water_dragon', '/static/img/survive/reword/scroll_water_dragon.png');
                this.load.image('scroll_rasenshuriken', '/static/img/survive/reword/scroll_rasenshuriken.png');
                this.load.image('scroll_explosive_shuriken', '/static/img/survive/reword/scroll_explosive_shuriken.png');
                this.load.image('scroll_pierce', '/static/img/survive/reword/scroll_pierce.png');
                this.load.image('scroll_clone', '/static/img/survive/reword/scroll_clone.png');
                this.load.image('scroll_magnet', '/static/img/survive/reword/scroll_magnet.png');
                
                // 골드 주머니 이미지 (원칙 6)
                this.load.image('goldpocket', '/static/img/survive/reword/goldpocket.png');

                ['sli', 'ssli'].forEach(prefix => {
                    for (let i = 1; i <= 4; i++) {
                        this.load.image(`${prefix}${i}`, `/static/img/survive/monster/sli/${prefix}${i}.png`);
                    }
                });

                this.load.image('grass1', '/static/img/survive/tile/grass1.png');
                this.load.image('grass5', '/static/img/survive/tile/grass5.png');
                this.load.image('rock1', '/static/img/survive/tile/rock1.png');
                this.load.image('rock2', '/static/img/survive/tile/rock2.png');
                this.load.image('rock3', '/static/img/survive/tile/rock3.png');
                this.load.image('tree1', '/static/img/survive/tile/tree1.png');
                this.load.image('tree2', '/static/img/survive/tile/tree2.png');
            }

            create() {
                playBGM(this, 'survive_main');
                this.scene.start('TitleScene');
            }
        }

        // ==========================================
        // 1. Title Scene
        // ==========================================
        class TitleScene extends Phaser.Scene {
            constructor() { super({ key: 'TitleScene' }); }

            create() {
                playBGM(this, 'survive_main');
                let bg = this.add.image(this.scale.width / 2, this.scale.height / 2, 'main_bg');
                let scale = Math.max(this.scale.width / bg.width, this.scale.height / bg.height);
                bg.setScale(scale);

                createMuteButton(this);

                let startY = isMobile ? this.scale.height - 220 : this.scale.height - 120;
                let startX = isMobile ? this.scale.width / 2 - 140 : this.scale.width / 2 - 180;
                let upgradeX = isMobile ? this.scale.width / 2 + 140 : this.scale.width / 2 + 180;
                let baseSize = isMobile ? 190 : 220;

                let startBtn = this.add.image(startX, startY, 'game_start').setDisplaySize(baseSize, baseSize).setInteractive();
                if(startBtn.preFX) {
                    startBtn.preFX.setPadding(32);
                    let startGlow = startBtn.preFX.addGlow(0xffcc00, 4, 0, false);
                    startGlow.active = false;
                    startBtn.on('pointerover', () => { 
                        startGlow.active = true; 
                        this.tweens.add({ targets: startBtn, scaleX: startBtn.scaleX * 1.05, scaleY: startBtn.scaleY * 1.05, duration: 100 });
                    });
                    startBtn.on('pointerout', () => { 
                        startGlow.active = false; 
                        this.tweens.add({ targets: startBtn, scaleX: startBtn.scaleX / 1.05, scaleY: startBtn.scaleY / 1.05, duration: 100 });
                    });
                }
                startBtn.on('pointerdown', () => {
                    playRandomSFX(this, 'button');
                    this.scene.start('StageSelectScene');
                });

                let upgradeBtn = this.add.image(upgradeX, startY, 'game_upgrade').setDisplaySize(baseSize, baseSize).setInteractive();
                if(upgradeBtn.preFX) {
                    upgradeBtn.preFX.setPadding(32);
                    let upgradeGlow = upgradeBtn.preFX.addGlow(0xffcc00, 4, 0, false);
                    upgradeGlow.active = false;
                    upgradeBtn.on('pointerover', () => { 
                        upgradeGlow.active = true;
                        this.tweens.add({ targets: upgradeBtn, scaleX: upgradeBtn.scaleX * 1.05, scaleY: upgradeBtn.scaleY * 1.05, duration: 100 });
                    });
                    upgradeBtn.on('pointerout', () => { 
                        upgradeGlow.active = false;
                        this.tweens.add({ targets: upgradeBtn, scaleX: upgradeBtn.scaleX / 1.05, scaleY: upgradeBtn.scaleY / 1.05, duration: 100 });
                    });
                }
                upgradeBtn.on('pointerdown', () => {
                    playRandomSFX(this, 'button');
                    this.scene.start('UpgradeScene');
                });

                let exitBtn = this.add.text(this.scale.width / 2, this.scale.height - 40, '메인 허브로 돌아가기', {
                    fontSize: '22px', fill: '#aaa', backgroundColor: '#222', padding: { x: 15, y: 8 }, borderRadius: 8
                }).setOrigin(0.5).setInteractive();
                
                exitBtn.on('pointerover', () => exitBtn.setBackgroundColor('#aa7722').setFill('#fff'));
                exitBtn.on('pointerout', () => exitBtn.setBackgroundColor('#222').setFill('#aaa'));
                exitBtn.on('pointerdown', () => {
                    playRandomSFX(this, 'button');
                    window.location.href = '/game';
                });
            }
        }

        // ==========================================
        // 2. Upgrade Scene
        // ==========================================
        class UpgradeScene extends Phaser.Scene {
            constructor() { super({ key: 'UpgradeScene' }); }

            create() {
                playBGM(this, 'survive_main');
                createMuteButton(this);
                this.add.text(this.scale.width / 2, 120, '무기 및 능력 강화', { fontSize: '40px', fill: '#ffcc00' }).setOrigin(0.5);
                this.add.text(this.scale.width / 2, this.scale.height / 2, '골드를 소모하여 영구 능력을 강화합니다.\n(업데이트 예정)', { fontSize: '24px', fill: '#fff', align: 'center' }).setOrigin(0.5);

                let backBtn = this.add.text(this.scale.width / 2, this.scale.height - 120, '뒤로가기', {
                    fontSize: '28px', fill: '#fff', backgroundColor: '#444', padding: { x: 25, y: 12 }
                }).setOrigin(0.5).setInteractive();

                backBtn.on('pointerover', () => backBtn.setBackgroundColor('#aa7722').setFill('#fff'));
                backBtn.on('pointerout', () => backBtn.setBackgroundColor('#444').setFill('#fff'));
                backBtn.on('pointerdown', () => {
                    playRandomSFX(this, 'button');
                    this.scene.start('TitleScene');
                });
            }
        }

        // ==========================================
        // 3. Stage Select Scene
        // ==========================================
        class StageSelectScene extends Phaser.Scene {
            constructor() { super({ key: 'StageSelectScene' }); }

            create() {
                if (!globalBGM || globalBGM.key !== 'survive_main') {
                    playBGM(this, 'survive_main');
                }

                createMuteButton(this);
                this.add.text(this.scale.width / 2, 80, '스테이지 선택', { fontSize: '40px', fill: '#fff' }).setOrigin(0.5);

                const stages = [
                    { id: 1, name: 'Stage 1: 슬라임 던전', time: 600, bossKey: 'boss_sli0' },
                    { id: 2, name: 'Stage 2: 어둠의 묘지', time: 720, bossKey: null },
                    { id: 3, name: 'Stage 3: 작열하는 화산', time: 900, bossKey: null },
                    { id: 4, name: 'Stage 4: 심연의 끝', time: 1020, bossKey: null },
                    { id: 5, name: 'Stage 5: 잊혀진 신전', time: 1200, bossKey: null },
                    { id: 6, name: 'Stage 6: 종말의 차원', time: 1800, bossKey: null }
                ];

                stages.forEach((stage, index) => {
                    let col = isMobile ? index % 2 : index % 3;
                    let row = isMobile ? Math.floor(index / 2) : Math.floor(index / 3);

                    let cardX = isMobile ? (this.scale.width / 2) - 160 + (col * 320) : (this.scale.width / 2) - 340 + (col * 340);
                    let cardY = isMobile ? 240 + (row * 240) : 260 + (row * 220);

                    let hitBox = this.add.rectangle(cardX, cardY, 280, 180, 0x222222, 0.85).setStrokeStyle(3, 0xaa7722);

                    if (stage.bossKey) {
                        this.add.image(cardX, cardY - 30, stage.bossKey).setDisplaySize(80, 80);
                    } else {
                        this.add.rectangle(cardX, cardY - 30, 80, 80, 0x444444);
                        this.add.text(cardX, cardY - 30, 'LOCKED', { fontSize: '16px', fill: '#888' }).setOrigin(0.5);
                    }

                    this.add.text(cardX, cardY + 45, `${stage.name}\n(보스: ${stage.time / 60}분)`, {
                        fontSize: '18px', fill: '#ddaa55', align: 'center', fontStyle: 'bold'
                    }).setOrigin(0.5);

                    hitBox.setInteractive();
                    hitBox.on('pointerover', () => {
                        hitBox.setFillStyle(0x443322);
                        hitBox.setStrokeStyle(3, 0xffcc00);
                    });
                    hitBox.on('pointerout', () => {
                        hitBox.setFillStyle(0x222222);
                        hitBox.setStrokeStyle(3, 0xaa7722);
                    });
                    hitBox.on('pointerdown', () => {
                        playRandomSFX(this, 'button');
                        this.scene.start('GameScene', { stageData: stage });
                    });
                });

                let backBtn = this.add.text(this.scale.width / 2, this.scale.height - 80, '메인 메뉴로', {
                    fontSize: '28px', fill: '#fff', backgroundColor: '#555', padding: { x: 20, y: 10 }
                }).setOrigin(0.5).setInteractive();

                backBtn.on('pointerover', () => backBtn.setBackgroundColor('#aa7722').setFill('#fff'));
                backBtn.on('pointerout', () => backBtn.setBackgroundColor('#555').setFill('#fff'));
                backBtn.on('pointerdown', () => {
                    playRandomSFX(this, 'button');
                    this.scene.start('TitleScene');
                });
            }
        }

        // ==========================================
        // 4. Game Scene (인게임)
        // ==========================================
        class GameScene extends Phaser.Scene {
            constructor() { super({ key: 'GameScene' }); }

            init(data) {
                this.stageData = data.stageData;
                this.elapsedTime = 0;

                this.playerStats = {
                    hp: 100, maxHp: 100, speed: 160, damage: 5, attackDelay: 1100,
                    level: 1, exp: 0, maxExp: 8, gold: 0, magnetRange: 150,
                    fire: 0, water: 0, wind: 0, bomb: 0, earth: 0, posionLv: 0,
                    pierce: 0, clone: 0, magnet: 0, maxHpLv: 0, speedLv: 0, healLv: 0
                };

                this.lastAttackTime = 0;
                this.lastFootstepTime = 0;
                this.lastSkillTimes = { fire: 0, water: 0, wind: 0, bomb: 0, earth: 0 };
                this.isInvincible = false;
                this.joystickVector = { x: 0, y: 0 };
                this.isLevelUpOpen = false;
                this.lastNamedSpawnTime = 0;
            }

            create() {
                playBGM(this, `stage${this.stageData.id}`);

                this.physics.world.setBounds(0, 0, 16000, 16000);
                createMuteButton(this);

                this.bgTile = this.add.tileSprite(8000, 8000, 16000, 16000, 'grass1').setDepth(-10);
                this.bgTile.setTileScale(0.25, 0.25);

                for (let y = 1000; y < 15000; y += 64) {
                    this.add.image(8000, y, 'grass5').setScale(0.25).setDepth(-9);
                }
                for (let x = 1000; x < 15000; x += 64) {
                    if (Math.abs(x - 8000) > 32) {
                        this.add.image(x, 8000, 'grass5').setScale(0.25).setRotation(Math.PI / 2).setDepth(-9);
                    }
                }

                this.obstacles = this.physics.add.staticGroup();
                for (let i = 0; i < 40; i++) {
                    let cx = Phaser.Math.Between(2000, 14000);
                    let cy = Phaser.Math.Between(2000, 14000);
                    if (Phaser.Math.Distance.Between(cx, cy, 8000, 8000) < 600) continue;

                    for (let j = 0; j < 6; j++) {
                        let tx = cx + Phaser.Math.Between(-150, 150);
                        let ty = cy + Phaser.Math.Between(-150, 150);
                        let tree = this.obstacles.create(tx, ty, Phaser.Math.RND.pick(['tree1', 'tree2'])).setScale(1.0);
                        tree.body.setSize(tree.width * 0.3, tree.height * 0.2);
                        tree.body.setOffset(tree.width * 0.35, tree.height * 0.75);
                    }
                }

                for (let i = 0; i < 60; i++) {
                    let rx = Phaser.Math.Between(1000, 15000);
                    let ry = Phaser.Math.Between(1000, 15000);
                    if (Phaser.Math.Distance.Between(rx, ry, 8000, 8000) < 500) continue;

                    let rock = this.obstacles.create(rx, ry, 'rock3').setScale(0.4);
                    rock.body.setSize(rock.width * 0.5, rock.height * 0.3);
                    rock.body.setOffset(rock.width * 0.25, rock.height * 0.6);
                }

                this.player = this.physics.add.sprite(8000, 8000, 'hero_1').setScale(0.4);
                this.player.setCollideWorldBounds(true);
                
                // 원칙 5: 주인공 정밀 히트박스 축소 설정
                this.player.body.setSize(this.player.width * 0.35, this.player.height * 0.35);
                this.player.body.setOffset(this.player.width * 0.325, this.player.height * 0.55);

                this.cameras.main.startFollow(this.player, true, 0.1, 0.1);

                this.enemies = this.physics.add.group();
                this.projectiles = this.physics.add.group();
                this.expItems = this.physics.add.group();
                this.goldItems = this.physics.add.group();
                this.meatItems = this.physics.add.group();
                this.rareBoxItems = this.physics.add.group();
                this.fieldMagnetItems = this.physics.add.group();

                this.physics.add.collider(this.player, this.obstacles);
                this.physics.add.collider(this.enemies, this.obstacles);
                this.physics.add.overlap(this.player, this.enemies, this.handlePlayerHit, null, this);
                this.physics.add.overlap(this.projectiles, this.enemies, this.handleProjectileHit, null, this);
                this.physics.add.overlap(this.player, this.expItems, this.collectExp, null, this);
                this.physics.add.overlap(this.player, this.goldItems, this.collectGold, null, this);
                this.physics.add.overlap(this.player, this.meatItems, this.collectMeat, null, this);
                this.physics.add.overlap(this.player, this.rareBoxItems, this.collectRareBox, null, this);
                this.physics.add.overlap(this.player, this.fieldMagnetItems, this.collectFieldMagnet, null, this);

                this.setupUI();

                this.cursors = this.input.keyboard.createCursorKeys();
                this.wasd = this.input.keyboard.addKeys({
                    up: Phaser.Input.Keyboard.KeyCodes.W, down: Phaser.Input.Keyboard.KeyCodes.S,
                    left: Phaser.Input.Keyboard.KeyCodes.A, right: Phaser.Input.Keyboard.KeyCodes.D
                });

                this.setupVirtualJoystick();

                this.time.addEvent({ delay: 1000, callback: this.updateGameLogic, callbackScope: this, loop: true });
                this.time.addEvent({ delay: 1000, callback: this.spawnEnemies, callbackScope: this, loop: true });
            }

            setupUI() {
                this.timerText = this.add.text(this.scale.width / 2, 68, '00:00', { fontSize: '32px', fill: '#fff', fontStyle: 'bold' }).setOrigin(0.5).setScrollFactor(0).setDepth(1000);
                this.levelText = this.add.text(30, 48, 'LV.1', { fontSize: '24px', fill: '#ffcc00', fontStyle: 'bold' }).setScrollFactor(0).setDepth(1000);

                this.expBarBg = this.add.rectangle(130, 88, 200, 16, 0x333333).setScrollFactor(0).setDepth(1000);
                this.expBar = this.add.rectangle(30, 88, 0, 16, 0x00ffcc).setOrigin(0, 0.5).setScrollFactor(0).setDepth(1001);

                this.hpText = this.add.text(30, 113, 'HP: 100 / 100', { fontSize: '18px', fill: '#ffffff', fontStyle: 'bold' }).setScrollFactor(0).setDepth(1000);
                this.playerHpBg = this.add.rectangle(130, 148, 200, 20, 0x330000).setScrollFactor(0).setDepth(1000);
                this.playerHpBar = this.add.rectangle(30, 148, 200, 20, 0xff2222).setOrigin(0, 0.5).setScrollFactor(0).setDepth(1001);

                // 원칙 6: goldpocket.png 아이콘 경로 사용
                if (this.textures.exists('goldpocket')) {
                    this.goldIcon = this.add.image(this.scale.width - 160, 68, 'goldpocket').setDisplaySize(36, 36).setScrollFactor(0).setDepth(1000).setInteractive();
                } else {
                    this.goldIcon = this.add.text(this.scale.width - 160, 68, '💰', { fontSize: '24px' }).setOrigin(0.5).setScrollFactor(0).setDepth(1000).setInteractive();
                }

                this.goldText = this.add.text(this.scale.width - 120, 68, '0', { fontSize: '22px', fill: '#ffd700', fontStyle: 'bold' }).setOrigin(0, 0.5).setScrollFactor(0).setDepth(1000).setInteractive();

                const openShop = () => {
                    if(!this.isLevelUpOpen) this.showShopUI();
                };
                this.goldIcon.on('pointerdown', openShop);
                this.goldText.on('pointerdown', openShop);
            }

            updateHpUI() {
                this.hpText.setText(`HP: ${this.playerStats.hp} / ${this.playerStats.maxHp}`);
                let hpPct = Math.max(0, this.playerStats.hp / this.playerStats.maxHp);
                this.playerHpBar.setSize(200 * hpPct, 20);
            }

            setupVirtualJoystick() {
                this.joyBase = this.add.circle(0, 0, 60, 0xffffff, 0.2).setScrollFactor(0).setDepth(9999).setVisible(false);
                this.joyThumb = this.add.circle(0, 0, 30, 0xffffff, 0.5).setScrollFactor(0).setDepth(10000).setVisible(false);

                this.input.on('pointerdown', (pointer) => {
                    if (this.isLevelUpOpen) return;
                    if (pointer.x > this.scale.width - 80 && pointer.y < 80) return;
                    this.joyBase.setPosition(pointer.x, pointer.y).setVisible(true);
                    this.joyThumb.setPosition(pointer.x, pointer.y).setVisible(true);
                });

                this.input.on('pointermove', (pointer) => {
                    if (!this.joyBase.visible || this.isLevelUpOpen) return;
                    let dist = Phaser.Math.Distance.Between(this.joyBase.x, this.joyBase.y, pointer.x, pointer.y);
                    let angle = Phaser.Math.Angle.Between(this.joyBase.x, this.joyBase.y, pointer.x, pointer.y);

                    let moveDist = Math.min(dist, 60);
                    this.joyThumb.x = this.joyBase.x + Math.cos(angle) * moveDist;
                    this.joyThumb.y = this.joyBase.y + Math.sin(angle) * moveDist;

                    this.joystickVector.x = Math.cos(angle) * (moveDist / 60);
                    this.joystickVector.y = Math.sin(angle) * (moveDist / 60);
                });

                this.input.on('pointerup', () => {
                    this.joyBase.setVisible(false);
                    this.joyThumb.setVisible(false);
                    this.joystickVector = { x: 0, y: 0 };
                });
            }

            // 넉백 적용 함수 (물리 velocity 기반 강한 순간 밀침 + 추적 시간 유예)
            applyKnockback(enemy, angle, force) {
                if (!enemy || !enemy.active) return;
                enemy.knockbackTimer = this.time.now + 250;
                let kx = Math.cos(angle) * force * 7;
                let ky = Math.sin(angle) * force * 7;
                enemy.body.setVelocity(kx, ky);
            }

            update(time) {
                if (this.isLevelUpOpen) {
                    this.player.body.setVelocity(0, 0);
                    return;
                }

                let vx = 0, vy = 0;

                if (this.cursors.left.isDown || this.wasd.left.isDown) vx = -1;
                else if (this.cursors.right.isDown || this.wasd.right.isDown) vx = 1;

                if (this.cursors.up.isDown || this.wasd.up.isDown) vy = -1;
                else if (this.cursors.down.isDown || this.wasd.down.isDown) vy = 1;

                if (this.joystickVector.x !== 0 || this.joystickVector.y !== 0) {
                    vx = this.joystickVector.x;
                    vy = this.joystickVector.y;
                } else if (vx !== 0 && vy !== 0) {
                    vx *= Math.SQRT1_2; vy *= Math.SQRT1_2;
                }

                this.player.body.setVelocity(vx * this.playerStats.speed, vy * this.playerStats.speed);

                if ((vx !== 0 || vy !== 0) && time > this.lastFootstepTime + 350) {
                    playRandomSFX(this, 'footstep', 0.2);
                    this.lastFootstepTime = time;
                }

                if (Math.abs(vx) > Math.abs(vy)) {
                    if (vx < 0) this.player.setTexture('hero_3');
                    else if (vx > 0) this.player.setTexture('hero_4');
                } else if (Math.abs(vy) > 0) {
                    if (vy > 0) this.player.setTexture('hero_1');
                    else if (vy < 0) this.player.setTexture('hero_2');
                }

                this.player.setDepth(this.player.y);

                if (time > this.lastAttackTime + this.playerStats.attackDelay) {
                    this.fireBasicSuri();
                    this.lastAttackTime = time;
                }

                this.updateActiveSkills(time);

                this.enemies.getChildren().forEach(enemy => {
                    if (enemy.hpBar && enemy.active) {
                        enemy.hpBar.clear();
                        if (enemy.hp < enemy.maxHp) {
                            enemy.hpBar.fillStyle(0x000000, 0.5);
                            enemy.hpBar.fillRect(enemy.x - 15, enemy.y - 25, 30, 4);
                            enemy.hpBar.fillStyle(0xff0000, 1);
                            enemy.hpBar.fillRect(enemy.x - 15, enemy.y - 25, Math.max(0, 30 * (enemy.hp / enemy.maxHp)), 4);
                        }
                    }
                    if (enemy.updateLogic) enemy.updateLogic();
                });

                // 필드 자력 흡수 로직 (경험치, 골드, 고기, 레어 상자, 자석 아이템)
                const pullGroup = (group) => {
                    group.getChildren().forEach(item => {
                        let dist = Phaser.Math.Distance.Between(this.player.x, this.player.y, item.x, item.y);
                        if (item.isMagnetPulled || dist < this.playerStats.magnetRange) {
                            this.physics.moveToObject(item, this.player, 400);
                        } else {
                            item.body.setVelocity(0, 0);
                        }
                    });
                };

                pullGroup(this.expItems);
                pullGroup(this.goldItems);
                pullGroup(this.meatItems);
                pullGroup(this.rareBoxItems);
                pullGroup(this.fieldMagnetItems);
            }

            fireBasicSuri() {
                let target = this.getClosestEnemy();
                if (!target) return;

                playRandomSFX(this, 'suri_throw', 0.4);
                let angleBase = Phaser.Math.Angle.Between(this.player.x, this.player.y, target.x, target.y);

                if(this.textures.exists('suri_vfx')) {
                    let vfx = this.add.image(this.player.x, this.player.y, 'suri_vfx').setScale(0.18).setRotation(angleBase + Math.PI / 2).setDepth(9998);
                    this.tweens.add({ targets: vfx, scale: 0.28, alpha: 0, duration: 120, onComplete: () => vfx.destroy() });
                }

                let count = 1 + this.playerStats.clone;
                for (let i = 0; i < count; i++) {
                    let suri = this.projectiles.create(this.player.x, this.player.y, 'suri').setScale(0.18).setDepth(9999);
                    let angle = angleBase + ((i - (count - 1) / 2) * 0.2);

                    suri.rotation = angle + Math.PI / 2;
                    suri.damage = this.playerStats.damage;
                    suri.pierce = this.playerStats.pierce;
                    suri.isBomb = false;
                    suri.knockback = 15; // 기본 수리검 넉백

                    this.physics.velocityFromRotation(angle, 500, suri.body.velocity);
                }
            }

            updateActiveSkills(time) {
                let target = this.getClosestEnemy();

                // 1. 화둔: 단일 히트, 데미지 2배 상향, 범위 30% 축소, 캐릭터 외곽선 오프셋 적용
                if (this.playerStats.fire > 0 && time > this.lastSkillTimes.fire + 3500) {
                    playRandomSFX(this, 'skill_fire', 0.6);
                    let angle = target ? Phaser.Math.Angle.Between(this.player.x, this.player.y, target.x, target.y) : (this.player.texture.key === 'hero_3' ? Math.PI : 0);
                    
                    const createFireStream = (fireAngle) => {
                        let offsetX = Math.cos(fireAngle) * 45;
                        let offsetY = Math.sin(fireAngle) * 45;
                        
                        let fire = this.physics.add.sprite(this.player.x + offsetX, this.player.y + offsetY, 'fire_stream')
                            .setDisplaySize(140, 84) // 30% 범위 축소
                            .setRotation(fireAngle + Math.PI)
                            .setDepth(9999);

                        fire.damage = 7.0 + (this.playerStats.fire * 5.0); // 데미지 2배 상향
                        fire.hitEnemies = [];

                        this.physics.add.overlap(fire, this.enemies, (f, enemy) => {
                            if (!f.hitEnemies.includes(enemy.id)) {
                                f.hitEnemies.push(enemy.id);
                                this.damageEnemy(enemy, f.damage);
                                this.applyKnockback(enemy, fireAngle, 25);
                            }
                        });
                        this.tweens.add({ targets: fire, alpha: 0, scaleX: 1.1, scaleY: 1.1, duration: 500, onComplete: () => fire.destroy() });
                    };

                    createFireStream(angle);
                    if (this.playerStats.fire >= 3) {
                        createFireStream(angle + Math.PI); // Lv3 이상 시 180도 반대 방향 동시 발사
                    }

                    this.lastSkillTimes.fire = time;
                }

                // 2. 수둔: 레벨당 발사 개수 증가 및 강력 데미지
                if (this.playerStats.water > 0 && time > this.lastSkillTimes.water + (3200 - (this.playerStats.water * 200)) && target) {
                    playRandomSFX(this, 'skill_water', 0.6);
                    let baseAngle = Phaser.Math.Angle.Between(this.player.x, this.player.y, target.x, target.y);
                    let waterKey = this.textures.exists('water_dragon') ? 'water_dragon' : 'suri';
                    
                    let count = this.playerStats.water; // Lv1 = 1개, Lv2 = 2개...
                    for (let i = 0; i < count; i++) {
                        let angle = baseAngle + ((i - (count - 1) / 2) * 0.25);
                        let water = this.projectiles.create(this.player.x, this.player.y, waterKey).setDisplaySize(80, 80).setDepth(9999);
                        water.rotation = angle + Math.PI / 2;
                        water.damage = 10 + (this.playerStats.water * 4);
                        water.pierce = 0;
                        water.isBomb = false;
                        water.knockback = 20;
                        this.physics.velocityFromRotation(angle, 420, water.body.velocity);
                    }
                    this.lastSkillTimes.water = time;
                }

                // 3. 풍둔 나선수리검: 1회 스침 타격 및 넉백 35px
                if (this.playerStats.wind > 0 && time > this.lastSkillTimes.wind + 4500) {
                    playRandomSFX(this, 'skill_wind', 0.6);
                    let baseAngle = target ? Phaser.Math.Angle.Between(this.player.x, this.player.y, target.x, target.y) : Math.random() * Math.PI * 2;
                    let windKey = this.textures.exists('rasenshuriken') ? 'rasenshuriken' : 'suri';

                    let count = 1 + (this.playerStats.clone); // 분신술 적용
                    for (let i = 0; i < count; i++) {
                        let angle = baseAngle + ((i - (count - 1) / 2) * 0.3);
                        let wind = this.projectiles.create(this.player.x, this.player.y, windKey).setDisplaySize(120, 120).setDepth(9999);
                        wind.damage = 7.0 + (this.playerStats.wind * 2.5);
                        wind.pierce = 999;
                        wind.isBomb = false;
                        wind.knockback = 35; // 나선수리검 넉백 35px
                        wind.hitEnemies = []; // 1회 타격 리스트

                        this.tweens.add({ targets: wind, rotation: wind.rotation + Math.PI * 10, duration: 2500 });
                        this.physics.velocityFromRotation(angle, 250, wind.body.velocity);
                        this.time.delayedCall(3000, () => { if(wind.active) wind.destroy(); });
                    }
                    this.lastSkillTimes.wind = time;
                }

                // 4. 기폭찰 수리검: 40px 크기, 회전 날아감, explosion_vfx 폭발, 넉백 20px
                if (this.playerStats.bomb > 0 && time > this.lastSkillTimes.bomb + 3200 && target) {
                    playRandomSFX(this, 'skill_bomb', 0.6);
                    let baseAngle = Phaser.Math.Angle.Between(this.player.x, this.player.y, target.x, target.y);
                    let bombKey = this.textures.exists('explosive_shuriken') ? 'explosive_shuriken' : 'suri';

                    let count = 1 + (this.playerStats.clone); // 분신술 적용
                    for (let i = 0; i < count; i++) {
                        let angle = baseAngle + ((i - (count - 1) / 2) * 0.2);
                        let bombSuri = this.projectiles.create(this.player.x, this.player.y, bombKey).setDisplaySize(40, 40).setDepth(9999);
                        
                        this.tweens.add({ targets: bombSuri, rotation: '+=12.56', duration: 1000, repeat: -1 });

                        bombSuri.damage = 4.0 + (this.playerStats.bomb * 2.0);
                        bombSuri.pierce = 0;
                        bombSuri.isBomb = true;
                        bombSuri.knockback = 20; // 기폭찰 넉백 20px
                        
                        this.physics.velocityFromRotation(angle, 450, bombSuri.body.velocity);
                    }
                    this.lastSkillTimes.bomb = time;
                }

                // 5. 토둔: 토류벽 (캐릭터 중앙 발생, 넉백 85px 강하게 밀쳐냄)
                if (this.playerStats.earth > 0 && time > this.lastSkillTimes.earth + (7000 - (this.playerStats.earth * 400))) {
                    playRandomSFX(this, 'skill_bomb', 0.6);
                    
                    let wallKey = this.textures.exists('earth_wall') ? 'earth_wall' : 'suri_vfx';
                    let wall = this.physics.add.sprite(this.player.x, this.player.y, wallKey).setDisplaySize(280, 160).setDepth(9998);
                    
                    if(wall.preFX) wall.preFX.addGlow(0x8B4513, 3, 0, false);

                    wall.damage = 8 + (this.playerStats.earth * 4);
                    wall.hitEnemies = [];

                    // 토류벽 넉백 판정: 벽이 펼쳐지는 동안 근접한 적을 외곽으로 강력히 밀쳐냄
                    let wallOverlap = this.time.addEvent({
                        delay: 100,
                        repeat: 10,
                        callback: () => {
                            if (!wall || !wall.active) return;
                            this.enemies.getChildren().forEach(e => {
                                if (!e.active) return;
                                let dist = Phaser.Math.Distance.Between(this.player.x, this.player.y, e.x, e.y);
                                if (dist <= 140) { // 토류벽 안쪽/벽 범위 내 적
                                    let pushAngle = Phaser.Math.Angle.Between(this.player.x, this.player.y, e.x, e.y);
                                    if (!wall.hitEnemies.includes(e.id)) {
                                        wall.hitEnemies.push(e.id);
                                        this.damageEnemy(e, wall.damage);
                                    }
                                    this.applyKnockback(e, pushAngle, 85); // 85px 넉백
                                }
                            });
                        }
                    });

                    this.tweens.add({ 
                        targets: wall, 
                        alpha: { from: 1, to: 0 }, 
                        scaleX: 1.15, scaleY: 1.15, 
                        delay: 900, 
                        duration: 300, 
                        onComplete: () => {
                            if(wallOverlap) wallOverlap.destroy();
                            wall.destroy(); 
                        } 
                    });

                    this.lastSkillTimes.earth = time;
                }
            }

            getClosestEnemy() {
                let closest = null;
                let minDist = Infinity;
                this.enemies.getChildren().forEach(enemy => {
                    let dist = Phaser.Math.Distance.Between(this.player.x, this.player.y, enemy.x, enemy.y);
                    if (dist < minDist) { minDist = dist; closest = enemy; }
                });
                return closest;
            }

            spawnEnemies() {
                if (this.isLevelUpOpen) return;
                let count = 2 + Math.floor(this.elapsedTime / 45);

                for (let i = 0; i < count; i++) {
                    let angle = Math.random() * Math.PI * 2;
                    let ex = this.player.x + Math.cos(angle) * 800;
                    let ey = this.player.y + Math.sin(angle) * 800;

                    let isType1 = Math.random() < 0.5;
                    let key = isType1 ? 'sli1' : 'ssli1';
                    let enemy = this.enemies.create(ex, ey, key).setScale(0.26);
                    enemy.id = Phaser.Utils.String.UUID();
                    enemy.isType1 = isType1;
                    enemy.isNamed = false;

                    // Hard Mode 체력 스케일링: 60초 이후 20초마다 HP +4 증가
                    let baseHp = 10;
                    if (this.elapsedTime > 60) {
                        baseHp += Math.floor((this.elapsedTime - 60) / 20) * 4;
                    }
                    enemy.hp = baseHp;
                    enemy.maxHp = baseHp;
                    enemy.hpBar = this.add.graphics().setDepth(100);

                    enemy.update = () => {
                        // 넉백 진행 중일 때는 플레이어 추적을 일시 중지
                        if (enemy.knockbackTimer && this.time.now < enemy.knockbackTimer) {
                            return;
                        }

                        this.physics.moveToObject(enemy, this.player, 68);
                        let vx = enemy.body.velocity.x;
                        let vy = enemy.body.velocity.y;
                        let prefix = enemy.isType1 ? 'sli' : 'ssli';

                        if (Math.abs(vx) > Math.abs(vy)) {
                            if (vx < 0) enemy.setTexture(prefix + '3');
                            else if (vx > 0) enemy.setTexture(prefix + '4');
                        } else if (Math.abs(vy) > 0) {
                            if (vy > 0) enemy.setTexture(prefix + '1');
                            else if (vy < 0) enemy.setTexture(prefix + '2');
                        }
                    };
                }

                // 네임드 특수 몬스터 스폰 (90초마다 스폰, Plum 색상, 체력 15배, 공격력 2배)
                if (this.elapsedTime > 0 && this.elapsedTime % 90 === 0 && this.elapsedTime !== this.lastNamedSpawnTime) {
                    this.lastNamedSpawnTime = this.elapsedTime;
                    let angle = Math.random() * Math.PI * 2;
                    let ex = this.player.x + Math.cos(angle) * 750;
                    let ey = this.player.y + Math.sin(angle) * 750;

                    let namedEnemy = this.enemies.create(ex, ey, 'sli1').setScale(0.48);
                    namedEnemy.id = Phaser.Utils.String.UUID();
                    namedEnemy.isType1 = true;
                    namedEnemy.isNamed = true;

                    // Plum 계열 색상 틴트 및 반짝이는 외곽선 이펙트
                    namedEnemy.setTint(0x8B008B);
                    if(namedEnemy.preFX) namedEnemy.preFX.addGlow(0xDA70D6, 5, 0, false);

                    let baseHp = 10;
                    if (this.elapsedTime > 60) baseHp += Math.floor((this.elapsedTime - 60) / 20) * 4;
                    namedEnemy.hp = baseHp * 15; // 체력 15배
                    namedEnemy.maxHp = namedEnemy.hp;
                    namedEnemy.hpBar = this.add.graphics().setDepth(100);

                    namedEnemy.update = () => {
                        if (namedEnemy.knockbackTimer && this.time.now < namedEnemy.knockbackTimer) return;
                        this.physics.moveToObject(namedEnemy, this.player, 55);
                    };

                    let warn = this.add.text(this.scale.width / 2, 160, '⚠ 네임드 특수 슬라임 등장! ⚠', {
                        fontSize: '32px', fill: '#DA70D6', fontStyle: 'bold'
                    }).setOrigin(0.5).setScrollFactor(0);
                    this.time.delayedCall(2500, () => warn.destroy());
                }
            }

            handleProjectileHit(projectile, enemy) {
                // 나선수리검 1회 타격 확인
                if (projectile.hitEnemies) {
                    if (projectile.hitEnemies.includes(enemy.id)) return;
                    projectile.hitEnemies.push(enemy.id);
                }

                this.damageEnemy(enemy, projectile.damage);

                // 넉백 적용
                let hitAngle = Phaser.Math.Angle.Between(projectile.x, projectile.y, enemy.x, enemy.y);
                this.applyKnockback(enemy, hitAngle, projectile.knockback || 15);

                if (projectile.isBomb) {
                    playRandomSFX(this, 'skill_bomb', 0.5);
                    let explosionX = projectile.x;
                    let explosionY = projectile.y;
                    
                    let explosionKey = this.textures.exists('explosion_vfx') ? 'explosion_vfx' : 'suri_vfx';
                    let explosion = this.physics.add.sprite(explosionX, explosionY, explosionKey).setDisplaySize(90, 90).setDepth(9999);
                    
                    // 기폭찰 좁은 범위 피해 (주인공 크기 수준 반경 45px)
                    let areaRadius = 45;
                    this.enemies.getChildren().forEach(e => {
                        if (e.active && e !== enemy) {
                            let dist = Phaser.Math.Distance.Between(explosionX, explosionY, e.x, e.y);
                            if (dist <= areaRadius) {
                                this.damageEnemy(e, projectile.damage * 0.8);
                                this.applyKnockback(e, Phaser.Math.Angle.Between(explosionX, explosionY, e.x, e.y), 20);
                            }
                        }
                    });

                    this.tweens.add({ targets: explosion, scaleX: 1.3, scaleY: 1.3, alpha: 0, duration: 250, onComplete: () => explosion.destroy() });
                }

                if (projectile.pierce <= 0) {
                    projectile.destroy();
                } else {
                    projectile.pierce--;
                }
            }

            damageEnemy(enemy, dmg) {
                playRandomSFX(this, 'hit_impact', 0.3);
                enemy.hp -= dmg;
                enemy.setTint(0xffffff);
                this.time.delayedCall(100, () => {
                    if(enemy.active) {
                        if(enemy.isNamed) enemy.setTint(0x8B008B);
                        else enemy.clearTint();
                    }
                });

                if (enemy.hp <= 0) {
                    if (enemy.hpBar) enemy.hpBar.destroy();

                    if (enemy.isNamed) {
                        // 네임드 몬스터 처치 시: rare_box 및 40배 경험치 구체 드롭
                        let rBox = this.rareBoxItems.create(enemy.x - 20, enemy.y, 'rare_box').setDisplaySize(45, 45);
                        if(rBox.preFX) rBox.preFX.addGlow(0xffcc00, 4, 0, false);

                        let bigExp = this.expItems.create(enemy.x + 20, enemy.y, 'sli_drop1').setDisplaySize(50, 50);
                        bigExp.expAmount = 40; // 40배 경험치
                        if(bigExp.preFX) bigExp.preFX.addGlow(0x00ffcc, 5, 0, false);
                    } else {
                        // 일반 슬라임 처치 드롭
                        this.expItems.create(enemy.x, enemy.y, 'sli_drop1').setScale(0.3);
                        
                        if (Math.random() < 0.1) this.goldItems.create(enemy.x, enemy.y, 'sli_drop3').setScale(0.3);
                        
                        // 고기 아이템 드롭 확률 0.5% (0.005)
                        if (Math.random() < 0.005) {
                            let meat = this.meatItems.create(enemy.x, enemy.y, 'meat').setDisplaySize(35, 35);
                            if(meat.preFX) meat.preFX.addGlow(0xff3333, 3, 0, false);
                        }

                        // 자석 아이템 드롭 확률 0.8% (0.008)
                        if (Math.random() < 0.008) {
                            let mag = this.fieldMagnetItems.create(enemy.x, enemy.y, 'field_magnet').setDisplaySize(36, 36);
                            if(mag.preFX) mag.preFX.addGlow(0x00ffff, 4, 0, false);
                        }
                    }

                    enemy.destroy();
                }
            }

            handlePlayerHit(player, enemy) {
                if (this.isInvincible || this.isLevelUpOpen) return;

                let dmg = enemy.isNamed ? 20 : 10; // 네임드 몬스터 공격력 2배
                this.playerStats.hp -= dmg;
                this.updateHpUI();
                this.isInvincible = true;

                this.cameras.main.shake(150, 0.015);
                player.setTintFill(0xff0000);
                
                let flash = this.add.rectangle(this.player.x, this.player.y, GAME_WIDTH * 2, GAME_HEIGHT * 2, 0xff0000, 0.3).setDepth(10000);
                this.tweens.add({ targets: flash, alpha: 0, duration: 150, onComplete: () => flash.destroy() });
                this.tweens.add({ targets: player, alpha: 0.3, duration: 100, yoyo: true, repeat: 5, onComplete: () => { player.clearTint(); player.alpha = 1; this.isInvincible = false; } });

                if (this.playerStats.hp <= 0) {
                    this.physics.pause();
                    playRandomSFX(this, 'game_over');
                    this.add.text(this.scale.width / 2, this.scale.height / 2, 'GAME OVER', { fontSize: '64px', fill: '#ff0000', fontStyle: 'bold' }).setOrigin(0.5).setScrollFactor(0).setDepth(10001);
                    this.time.delayedCall(2500, () => this.scene.start('StageSelectScene'));
                }
            }

            collectExp(player, exp) {
                if (this.isLevelUpOpen) return;
                let amount = exp.expAmount || 1;
                exp.destroy();
                playRandomSFX(this, 'pickup', 0.4);
                this.playerStats.exp += amount;

                if (this.playerStats.exp >= this.playerStats.maxExp) {
                    this.playerStats.level++;
                    this.playerStats.exp = 0;
                    
                    // 1~3레벨 구간 요구 경험치 50% 단축
                    if (this.playerStats.level === 2) this.playerStats.maxExp = 12;
                    else if (this.playerStats.level === 3) this.playerStats.maxExp = 18;
                    else this.playerStats.maxExp = Math.floor(this.playerStats.maxExp * 1.44) + 10;

                    this.levelText.setText(`LV.${this.playerStats.level}`);
                    this.showLevelUpUI(false);
                }
                this.expBar.setSize((this.playerStats.exp / this.playerStats.maxExp) * 200, 16);
            }

            collectGold(player, gold) {
                if (this.isLevelUpOpen) return;
                gold.destroy();
                playRandomSFX(this, 'pickup', 0.5);
                this.playerStats.gold += 10;
                this.goldText.setText(`${this.playerStats.gold}`);
            }

            collectMeat(player, meat) {
                if (this.isLevelUpOpen) return;
                meat.destroy();
                playRandomSFX(this, 'pickup', 0.6);
                this.playerStats.hp = Math.min(this.playerStats.hp + 30, this.playerStats.maxHp);
                this.updateHpUI();
            }

            collectRareBox(player, rBox) {
                if (this.isLevelUpOpen) return;
                rBox.destroy();
                playRandomSFX(this, 'level_up', 0.7);
                this.showLevelUpUI(true); // 확정 레어 보상 호출
            }

            // 신규 아이템: 자석 획득 시 필드 모든 아이템 끌어당겨 전부 흡수
            collectFieldMagnet(player, mag) {
                if (this.isLevelUpOpen) return;
                mag.destroy();
                playRandomSFX(this, 'pickup', 0.8);

                const markPulled = (group) => {
                    group.getChildren().forEach(item => { item.isMagnetPulled = true; });
                };

                markPulled(this.expItems);
                markPulled(this.goldItems);
                markPulled(this.meatItems);
                markPulled(this.rareBoxItems);
                markPulled(this.fieldMagnetItems);
            }

            updateGameLogic() {
                if (this.isLevelUpOpen) return;
                this.elapsedTime++;
                let mins = Math.floor(this.elapsedTime / 60);
                let secs = this.elapsedTime % 60;
                this.timerText.setText(`${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`);

                this.enemies.getChildren().forEach(e => { if (e.update) e.update(); });

                if (this.elapsedTime === this.stageData.time) {
                    playRandomSFX(this, 'boss_warning', 0.8);
                    playBGM(this, 'final_boss');

                    let warn = this.add.text(this.scale.width / 2, this.scale.height / 2, '⚠ 보스 출현 ⚠', {
                        fontSize: '64px', fill: '#ff0000', fontStyle: 'bold'
                    }).setOrigin(0.5).setScrollFactor(0);
                    this.time.delayedCall(3000, () => warn.destroy());
                }
            }

            // ==========================================
            // 원칙 2 & 원칙 6 준수: 카메라 좌표 기반 직접 생성 및 세로 정렬 카드
            // 원칙 7 준수: Depth 정밀 설정 (20000 ~ 20002)
            // ==========================================
            showLevelUpUI(isRareOnly = false) {
                this.isLevelUpOpen = true;
                this.physics.pause();
                playRandomSFX(this, 'level_up');

                this.levelUpElements = [];

                let overlay = this.add.rectangle(this.scale.width / 2, this.scale.height / 2, this.scale.width, this.scale.height, 0x000000, 0.85)
                    .setScrollFactor(0)
                    .setDepth(20000)
                    .setInteractive();

                let titleTxt = isRareOnly ? '★ 레어 보상 상획득! ★' : 'LEVEL UP!';
                let titleColor = isRareOnly ? '#ffdd00' : '#ffcc00';

                let title = this.add.text(this.scale.width / 2, isMobile ? 120 : 100, titleTxt, { fontSize: '42px', fill: titleColor, fontStyle: 'bold' })
                    .setOrigin(0.5)
                    .setScrollFactor(0)
                    .setDepth(20002);

                this.levelUpElements.push(overlay, title);

                const rewardPool = [
                    { id: 'fire', type: 'normal', name: '화둔: 호화구의 술', desc: '전방에 화염을 뿜습니다. (Lv.3이상 전/후방 분사)', statKey: 'fire', icon: 'scroll_fire_stream', maxLv: 5 },
                    { id: 'water', type: 'normal', name: '수둔: 수룡탄의 술', desc: '적을 향해 강력한 수룡탄을 발사합니다.', statKey: 'water', icon: 'scroll_water_dragon', maxLv: 5 },
                    { id: 'wind', type: 'normal', name: '풍둔: 나선 수리검', desc: '적을 1회 스쳐 관통하는 회전 수리검을 던집니다.', statKey: 'wind', icon: 'scroll_rasenshuriken', maxLv: 5 },
                    { id: 'bomb', type: 'normal', name: '기폭찰 수리검', desc: '명중 위치에서 즉시 범위 폭발을 일으킵니다.', statKey: 'bomb', icon: 'scroll_explosive_shuriken', maxLv: 5 },
                    { id: 'earth', type: 'normal', name: '토둔: 토류벽', desc: '주변에 토류벽을 생성하여 적을 크게 밀쳐냅니다.', statKey: 'earth', icon: 'scroll_earth_wall', maxLv: 5 },
                    { id: 'posion', type: 'normal', name: '닌자 비전: 병량환', desc: '공격속도가 대폭 상승하고 공격력이 +2 증가합니다.', statKey: 'posionLv', icon: 'ninja_posion', maxLv: 3 },
                    { id: 'hp', type: 'normal', name: '체력 한계 돌파', desc: '최대 체력을 +20 늘리고 체력을 회복합니다.', statKey: 'maxHpLv', icon: 'box', maxLv: 10 },
                    { id: 'speed', type: 'normal', name: '족경술: 이속 증가', desc: '플레이어의 이동속도를 증가시킵니다.', statKey: 'speedLv', icon: 'box', maxLv: 5 },
                    { id: 'pierce', type: 'rare', name: '[레어] 관통의 인', desc: '모든 기본 투사체의 관통 횟수 +1', statKey: 'pierce', icon: 'scroll_pierce', maxLv: 3 },
                    { id: 'clone', type: 'rare', name: '[레어] 분신술', desc: '기본공격, 기폭찰, 나선수리검 발사 수 +1', statKey: 'clone', icon: 'scroll_clone', maxLv: 3 },
                    { id: 'magnet', type: 'rare', name: '[레어] 노획 (자력)', desc: '경험치 보석 및 골드 획득 범위를 넓힙니다.', statKey: 'magnet', icon: 'scroll_magnet', maxLv: 5 }
                ];

                let available = rewardPool.filter(r => {
                    if (isRareOnly && r.type !== 'rare') return false;
                    return (this.playerStats[r.statKey] || 0) < r.maxLv;
                });

                if (available.length < 3) {
                    while(available.length < 3) {
                        available.push({ id: 'heal', type: 'normal', name: '체력 회복', desc: '체력을 즉시 20 회복합니다.', statKey: 'healLv', icon: 'box', maxLv: 999 });
                    }
                }

                let shuffled = Phaser.Utils.Array.Shuffle([...available]);
                let selected = shuffled.slice(0, 3);

                // 원칙 6: 레벨업 보상 카드 세로 정렬
                let cardWidth = isMobile ? 620 : 680;
                let cardHeight = isMobile ? 125 : 110;
                let cardSpacing = isMobile ? 145 : 125;
                let startY = isMobile ? 220 : 190;
                let cardX = this.scale.width / 2;

                selected.forEach((reward, idx) => {
                    let posY = startY + (idx * cardSpacing);
                    let isRare = reward.type === 'rare';

                    let strokeColor = isRare ? 0xffcc00 : 0x00aaff;
                    let cardBg = this.add.rectangle(cardX, posY, cardWidth, cardHeight, isRare ? 0x3d2b00 : 0x112233, 0.95)
                        .setStrokeStyle(3, strokeColor)
                        .setScrollFactor(0)
                        .setDepth(20001)
                        .setInteractive({ useHandCursor: true });

                    let iconKey = reward.icon || 'box';
                    if (!this.textures.exists(iconKey)) iconKey = (isRare ? 'rare_box' : 'box');

                    let icon = this.add.image(cardX - (cardWidth / 2) + 60, posY, iconKey)
                        .setScrollFactor(0)
                        .setDepth(20002);

                    // 병량환(ninja_posion.png) 39*42 원본 이미지 사이즈 고정 출력
                    if (iconKey === 'ninja_posion') {
                        icon.setDisplaySize(39, 42);
                    } else {
                        icon.setDisplaySize(65, 65);
                    }

                    let curLv = this.playerStats[reward.statKey] || 0;
                    let textStartX = cardX - (cardWidth / 2) + 110;

                    let nameTxt = this.add.text(textStartX, posY - 28, reward.name, { fontSize: '20px', fill: isRare ? '#ffdd00' : '#ffffff', fontStyle: 'bold' }).setScrollFactor(0).setDepth(20002);
                    let descTxt = this.add.text(textStartX, posY - 2, reward.desc, { fontSize: '14px', fill: '#cccccc' }).setScrollFactor(0).setDepth(20002);
                    
                    let lvTxt = null;
                    if(reward.id !== 'heal') {
                        lvTxt = this.add.text(textStartX, posY + 22, `Lv.${curLv} ➔ Lv.${curLv + 1} (Max: Lv.${reward.maxLv})`, { fontSize: '13px', fill: '#00ffcc' }).setScrollFactor(0).setDepth(20002);
                    }

                    this.levelUpElements.push(cardBg, icon, nameTxt, descTxt);
                    if(lvTxt) this.levelUpElements.push(lvTxt);

                    let glowTween = null;

                    cardBg.on('pointerover', (pointer, localX, localY, event) => {
                        if(event) event.stopPropagation();
                        cardBg.setFillStyle(isRare ? 0x664400 : 0x224466);
                        
                        glowTween = this.tweens.add({
                            targets: cardBg,
                            scaleX: 1.02,
                            scaleY: 1.02,
                            duration: 150,
                            yoyo: true,
                            repeat: -1
                        });
                    });

                    cardBg.on('pointerout', (pointer, localX, localY, event) => {
                        if(event) event.stopPropagation();
                        cardBg.setFillStyle(isRare ? 0x3d2b00 : 0x112233);
                        if(glowTween) {
                            glowTween.stop();
                            cardBg.setScale(1);
                        }
                    });

                    cardBg.on('pointerdown', (pointer, localX, localY, event) => {
                        if(event) event.stopPropagation();
                        playRandomSFX(this, 'button');
                        this.applyReward(reward);
                        this.closeLevelUpUI();
                    });
                });
            }

            closeLevelUpUI() {
                if (this.levelUpElements) {
                    this.levelUpElements.forEach(el => el.destroy());
                    this.levelUpElements = [];
                }
                this.isLevelUpOpen = false;
                this.physics.resume();
            }

            showShopUI() {
                this.isLevelUpOpen = true;
                this.physics.pause();
                
                this.shopElements = [];

                let overlay = this.add.rectangle(this.scale.width / 2, this.scale.height / 2, this.scale.width, this.scale.height, 0x000000, 0.85)
                    .setScrollFactor(0)
                    .setDepth(20000)
                    .setInteractive();

                let title = this.add.text(this.scale.width / 2, this.scale.height / 2 - 80, '골드 상점', { fontSize: '48px', fill: '#ffcc00', fontStyle: 'bold' }).setOrigin(0.5).setScrollFactor(0).setDepth(20002);
                let desc = this.add.text(this.scale.width / 2, this.scale.height / 2, '구현 준비 중...', { fontSize: '28px', fill: '#fff' }).setOrigin(0.5).setScrollFactor(0).setDepth(20002);

                let closeBtn = this.add.text(this.scale.width / 2, this.scale.height / 2 + 120, '닫기', {
                    fontSize: '28px', fill: '#fff', backgroundColor: '#555', padding: { x: 30, y: 15 }
                }).setOrigin(0.5).setScrollFactor(0).setDepth(20002).setInteractive({ useHandCursor: true });

                this.shopElements.push(overlay, title, desc, closeBtn);

                closeBtn.on('pointerover', () => closeBtn.setBackgroundColor('#aa7722').setFill('#fff'));
                closeBtn.on('pointerout', () => closeBtn.setBackgroundColor('#555').setFill('#fff'));
                closeBtn.on('pointerdown', (pointer, localX, localY, event) => {
                    if(event) event.stopPropagation();
                    playRandomSFX(this, 'button');
                    if (this.shopElements) {
                        this.shopElements.forEach(el => el.destroy());
                        this.shopElements = [];
                    }
                    this.isLevelUpOpen = false;
                    this.physics.resume();
                });
            }

            applyReward(reward) {
                if (!this.playerStats[reward.statKey]) this.playerStats[reward.statKey] = 0;
                this.playerStats[reward.statKey]++;

                if (reward.id === 'posion') {
                    // 병량환: 공격속도 대폭 상승(딜레이 감소) 및 공격력 +2
                    this.playerStats.attackDelay = Math.max(400, 1100 - (this.playerStats.posionLv * 233));
                    this.playerStats.damage += 2;
                }
                else if (reward.id === 'hp') { this.playerStats.maxHp += 20; this.playerStats.hp += 20; }
                else if (reward.id === 'speed') { this.playerStats.speed += 12; }
                else if (reward.id === 'magnet') { this.playerStats.magnetRange += 40; }
                else if (reward.id === 'heal') { this.playerStats.hp = Math.min(this.playerStats.hp + 20, this.playerStats.maxHp); }
                
                this.updateHpUI();
            }
        }

        const config = {
            type: Phaser.AUTO,
            parent: 'game-container',
            scale: { mode: Phaser.Scale.FIT, autoCenter: Phaser.Scale.CENTER_BOTH, width: GAME_WIDTH, height: GAME_HEIGHT },
            physics: { default: 'arcade', arcade: { debug: false } },
            scene: [PreloadScene, TitleScene, UpgradeScene, StageSelectScene, GameScene]
        };
        const game = new Phaser.Game(config);
    </script>
</body>
</html>
