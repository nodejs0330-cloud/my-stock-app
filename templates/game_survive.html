<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NCS SURVIVE - {{ username }}님</title>
    <!-- Phaser 3 최신 CDN -->
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    <style>
        body { margin: 0; padding: 0; background-color: #111; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        #game-container { width: 100%; height: 100%; }
    </style>
</head>
<body>
    <div id="game-container"></div>

    <script>
        Phaser.Scene.prototype.createMuteButton = function() {
            let icon = this.sound.mute ? '🔇' : '🔊';
            let muteBtn = this.add.text(this.scale.width - 50, 30, icon, { fontSize: '40px' })
                .setOrigin(0.5).setInteractive().setScrollFactor(0).setDepth(10000);
            muteBtn.on('pointerdown', () => {
                this.sound.mute = !this.sound.mute;
                muteBtn.setText(this.sound.mute ? '🔇' : '🔊');
            });
        };

        // ==========================================
        // 0. Preload Scene
        // ==========================================
        class PreloadScene extends Phaser.Scene {
            constructor() { super({ key: 'PreloadScene' }); }

            preload() {
                this.add.text(this.scale.width / 2, this.scale.height / 2, '로딩 중...', { fontSize: '32px', fill: '#fff' }).setOrigin(0.5);

                // 메인 및 버튼
                this.load.image('main_bg', '/static/img/survive/main.png');
                this.load.image('btn_start', '/static/img/survive/game_start.png');
                this.load.image('btn_upgrade', '/static/img/survive/game_upgrade.png');

                // 4방향 주인공
                this.load.image('hero_1', '/static/img/survive/hero/hero_1.png');
                this.load.image('hero_2', '/static/img/survive/hero/hero_2.png');
                this.load.image('hero_3', '/static/img/survive/hero/hero_3.png');
                this.load.image('hero_4', '/static/img/survive/hero/hero_4.png');

                // 스테이지 1 슬라임
                this.load.image('sli1', '/static/img/survive/monster/sli/sli1.png');
                this.load.image('sli2', '/static/img/survive/monster/sli/sli2.png');
                this.load.image('sli3', '/static/img/survive/monster/sli/sli3.png');
                this.load.image('sli4', '/static/img/survive/monster/sli/sli4.png');
                
                this.load.image('ssli1', '/static/img/survive/monster/sli/ssli1.png');
                this.load.image('ssli2', '/static/img/survive/monster/sli/ssli2.png');
                this.load.image('ssli3', '/static/img/survive/monster/sli/ssli3.png');
                this.load.image('ssli4', '/static/img/survive/monster/sli/ssli4.png');

                // 무기 및 보스/아이템 드랍
                this.load.image('boss_sli0', '/static/img/survive/monster/sli/boss_sli0.png');
                this.load.image('suri', '/static/img/survive/eqi/suri.png');
                this.load.image('sli_drop1', '/static/img/survive/monster/sli/sli_drop1.png');
                this.load.image('sli_drop3', '/static/img/survive/monster/sli/sli_drop3.png');

                // 레벨업 보상 상자
                this.load.image('box', '/static/img/survive/reword/box.png');
                this.load.image('rare_box', '/static/img/survive/reword/rare_box.png');

                // 타일 및 장식 요소 (grass2 제외)
                this.load.image('grass1', '/static/img/survive/tile/grass1.png');
                this.load.image('grass3', '/static/img/survive/tile/grass3.png');
                this.load.image('grass4', '/static/img/survive/tile/grass4.png');
                this.load.image('grass5', '/static/img/survive/tile/grass5.png');
                this.load.image('rock1', '/static/img/survive/tile/rock1.png');
                this.load.image('rock2', '/static/img/survive/tile/rock2.png');
                this.load.image('rock3', '/static/img/survive/tile/rock3.png');
                this.load.image('tree1', '/static/img/survive/tile/tree1.png');
                this.load.image('tree2', '/static/img/survive/tile/tree2.png');

                // BGM
                this.load.audio('bgm_main', '/static/bgm/survive/survive_main.mp3');
            }
            create() { this.scene.start('TitleScene'); }
        }

        // ==========================================
        // 1. Title Scene
        // ==========================================
        class TitleScene extends Phaser.Scene {
            constructor() { super({ key: 'TitleScene' }); }
            create() {
                if (!this.sound.get('bgm_main')) {
                    this.sound.play('bgm_main', { loop: true, volume: 0.5 });
                }

                let bg = this.add.image(this.scale.width / 2, this.scale.height / 2, 'main_bg');
                bg.setDisplaySize(this.scale.width, this.scale.height);
                this.createMuteButton();

                let startBtn = this.add.image(this.scale.width / 2 - 150, this.scale.height - 150, 'btn_start').setInteractive();
                startBtn.setDisplaySize(150, 150);
                startBtn.on('pointerover', () => startBtn.setTint(0xcccccc));
                startBtn.on('pointerout', () => startBtn.clearTint());
                startBtn.on('pointerdown', () => this.scene.start('StageSelectScene'));

                let upgradeBtn = this.add.image(this.scale.width / 2 + 150, this.scale.height - 150, 'btn_upgrade').setInteractive();
                upgradeBtn.setDisplaySize(150, 150);
                upgradeBtn.on('pointerover', () => upgradeBtn.setTint(0xcccccc));
                upgradeBtn.on('pointerout', () => upgradeBtn.clearTint());
                upgradeBtn.on('pointerdown', () => this.scene.start('UpgradeScene'));
                
                let exitBtn = this.add.text(20, 20, '← 허브로 돌아가기', { fontSize: '24px', fill: '#fff', backgroundColor: '#333', padding: {x:10, y:10} }).setInteractive();
                exitBtn.on('pointerdown', () => location.href = '/game');
            }
        }

        // ==========================================
        // 2. Upgrade Scene & Stage Select
        // ==========================================
        class UpgradeScene extends Phaser.Scene {
            constructor() { super({ key: 'UpgradeScene' }); }
            create() {
                this.createMuteButton();
                this.add.text(this.scale.width / 2, 100, '무기 강화소', { fontSize: '48px', fill: '#ffcc00' }).setOrigin(0.5);
                let backBtn = this.add.text(this.scale.width / 2, 500, '뒤로가기', { fontSize: '32px', fill: '#fff', backgroundColor: '#555', padding: { x: 20, y: 10 } }).setOrigin(0.5).setInteractive();
                backBtn.on('pointerdown', () => this.scene.start('TitleScene'));
            }
        }

        class StageSelectScene extends Phaser.Scene {
            constructor() { super({ key: 'StageSelectScene' }); }
            create() {
                this.createMuteButton();
                this.add.text(this.scale.width / 2, 80, '스테이지 선택', { fontSize: '48px', fill: '#fff' }).setOrigin(0.5);

                const stages = [
                    { id: 1, name: 'Stage 1: 슬라임 던전', time: 600 },
                    { id: 2, name: 'Stage 2: 어둠의 묘지', time: 720 },
                    { id: 3, name: 'Stage 3: 작열하는 화산', time: 900 },
                    { id: 4, name: 'Stage 4: 심연의 끝', time: 1020 },
                    { id: 5, name: 'Stage 5: 잊혀진 신전', time: 1200 },
                    { id: 6, name: 'Stage 6: 종말의 차원', time: 1800 }
                ];

                stages.forEach((stage, index) => {
                    let col = index % 3;
                    let row = Math.floor(index / 3);
                    let cardX = (this.scale.width / 2) - 300 + (col * 300);
                    let cardY = 280 + (row * 200); 

                    let bossPlaceholder;
                    if (stage.id === 1) {
                        bossPlaceholder = this.add.image(cardX, cardY - 40, 'boss_sli0').setDisplaySize(100, 100);
                    } else {
                        bossPlaceholder = this.add.rectangle(cardX, cardY - 40, 100, 100, 0x666666).setStrokeStyle(2, 0xffffff);
                    }
                    
                    let infoText = this.add.text(cardX, cardY + 40, `${stage.name}\n(보스: ${stage.time / 60}분)`, { fontSize: '20px', fill: '#0f0', align: 'center' }).setOrigin(0.5);
                    let hitBox = this.add.rectangle(cardX, cardY, 220, 180, 0x333333, 0.8).setStrokeStyle(2, 0xaaaaaa).setInteractive();
                    
                    this.add.container(0, 0, [hitBox, bossPlaceholder, infoText]);
                    hitBox.on('pointerover', () => hitBox.setFillStyle(0x555555));
                    hitBox.on('pointerout', () => hitBox.setFillStyle(0x333333));
                    hitBox.on('pointerdown', () => this.scene.start('GameScene', { stageData: stage }));
                });

                let backBtn = this.add.text(this.scale.width / 2, this.scale.height - 80, '뒤로가기', { fontSize: '28px', fill: '#fff', backgroundColor: '#555', padding: { x: 20, y: 10 } }).setOrigin(0.5).setInteractive();
                backBtn.on('pointerdown', () => this.scene.start('TitleScene'));
            }
        }

        // ==========================================
        // 4. Level Up Scene (나루토 컨셉 보상 팝업)
        // ==========================================
        class LevelUpScene extends Phaser.Scene {
            constructor() { super({ key: 'LevelUpScene' }); }
            init(data) { this.gameScene = data.scene; }

            create() {
                this.add.rectangle(this.scale.width / 2, this.scale.height / 2, this.scale.width, this.scale.height, 0x000000, 0.75);
                this.add.text(this.scale.width / 2, 80, 'LEVEL UP!', { fontSize: '56px', fill: '#ffcc00', fontStyle: 'bold', stroke: '#000', strokeThickness: 6 }).setOrigin(0.5);
                this.add.text(this.scale.width / 2, 140, '보상을 선택하세요 (중복 제거 적용)', { fontSize: '22px', fill: '#fff' }).setOrigin(0.5);

                this.selected = false;
                let pStats = this.gameScene.playerStats;

                // --- 보상 풀 정의 ---
                const normalPool = [
                    { id: 'katon', name: '닌자 두루마리: 화둔', desc: () => `플레이어 정면에 화염 방사\n[LV.${pStats.skills.katon.lvl} ➔ LV.${pStats.skills.katon.lvl + 1}]` },
                    { id: 'suiton', name: '닌자 두루마리: 수둔', desc: () => `수룡을 소환하여 범위 피해\n[LV.${pStats.skills.suiton.lvl} ➔ LV.${pStats.skills.suiton.lvl + 1}]` },
                    { id: 'fuuton', name: '닌자 두루마리: 풍둔', desc: () => `나선 수리검으로 범위 다단히트\n[LV.${pStats.skills.fuuton.lvl} ➔ LV.${pStats.skills.fuuton.lvl + 1}]` },
                    { id: 'bomb', name: '기폭찰 수리검', desc: () => `적 명중 시 폭발하는 수리검\n[LV.${pStats.skills.bomb.lvl} ➔ LV.${pStats.skills.bomb.lvl + 1}]` },
                    { id: 'hp', name: '체술: 체력 강화', desc: () => `Max HP +20 증가\n[현재: ${pStats.maxHp} ➔ ${pStats.maxHp + 20}]` },
                    { id: 'spd', name: '신체 활성화 (족경술)', desc: () => `이동 속도 +8% 증가\n[현재: ${pStats.speed} ➔ ${Math.round(pStats.speed * 1.08)}]` },
                    { id: 'cd', name: '차크라 집속', desc: () => `스킬 쿨타임 5% 감소\n[현재: ${pStats.fireRate}ms ➔ ${Math.max(600, Math.round(pStats.fireRate * 0.95))}ms]` }
                ];

                const rarePool = [
                    { id: 'pierce', name: '★ 관통의 인', desc: () => `모든 투사체 관통 횟수 +1\n[현재 관통: ${pStats.penetration}회 ➔ ${pStats.penetration + 1}회]` },
                    { id: 'clone', name: '★ 분신술 (Shadow Clone)', desc: () => `투사체 동시 발사 수 +1\n[현재 발사체: ${pStats.projectileCount}개 ➔ ${pStats.projectileCount + 1}개]` },
                    { id: 'magnet', name: '★ 노획 (자력의 술)', desc: () => `획득 범위 +20% 증가\n[현재 범위: ${pStats.magnetRadius}px ➔ ${Math.round(pStats.magnetRadius * 1.2)}px]` }
                ];

                // 3개 중복 없이 선택하기
                let selectedRewards = [];
                for (let i = 0; i < 3; i++) {
                    let isRare = Math.random() < 0.3; // 레어 확률 30%
                    let targetPool = isRare ? rarePool : normalPool;
                    
                    // 중복 방지 필터링
                    let available = targetPool.filter(r => !selectedRewards.some(s => s.item.id === r.id));
                    if (available.length === 0) {
                        available = normalPool.filter(r => !selectedRewards.some(s => s.item.id === r.id));
                    }

                    let picked = Phaser.Utils.Array.GetRandom(available);
                    selectedRewards.push({ isRare: isRare && targetPool === rarePool, item: picked });
                }

                // UI 생성
                selectedRewards.forEach((rewardObj, i) => {
                    let boxX = this.scale.width / 2 - 280 + (i * 280);
                    let boxY = this.scale.height / 2 + 30;
                    let isRare = rewardObj.isRare;
                    let item = rewardObj.item;

                    let cardBg = this.add.rectangle(boxX, boxY, 240, 320, isRare ? 0x3d2b00 : 0x1f2937)
                        .setStrokeStyle(3, isRare ? 0xffd700 : 0x4b5563).setInteractive();

                    let boxImg = this.add.image(boxX, boxY - 80, isRare ? 'rare_box' : 'box').setScale(0.6);

                    let titleText = this.add.text(boxX, boxY, item.name, {
                        fontSize: '20px', fill: isRare ? '#ffd700' : '#ffffff', fontStyle: 'bold', align: 'center', wordWrap: { width: 220 }
                    }).setOrigin(0.5);

                    let descText = this.add.text(boxX, boxY + 60, item.desc(), {
                        fontSize: '15px', fill: '#9ca3af', align: 'center', wordWrap: { width: 220 }
                    }).setOrigin(0.5);

                    cardBg.on('pointerover', () => cardBg.setStrokeStyle(4, 0x00ffff));
                    cardBg.on('pointerout', () => cardBg.setStrokeStyle(3, isRare ? 0xffd700 : 0x4b5563));

                    cardBg.on('pointerdown', () => {
                        if (this.selected) return;
                        this.selected = true;

                        // 스탯 적용
                        if (item.id === 'katon') pStats.skills.katon.lvl++;
                        else if (item.id === 'suiton') pStats.skills.suiton.lvl++;
                        else if (item.id === 'fuuton') pStats.skills.fuuton.lvl++;
                        else if (item.id === 'bomb') pStats.skills.bomb.lvl++;
                        else if (item.id === 'hp') { pStats.maxHp += 20; pStats.hp += 20; }
                        else if (item.id === 'spd') pStats.speed = Math.round(pStats.speed * 1.08);
                        else if (item.id === 'cd') pStats.fireRate = Math.max(600, Math.round(pStats.fireRate * 0.95));
                        else if (item.id === 'pierce') pStats.penetration += 1;
                        else if (item.id === 'clone') pStats.projectileCount += 1;
                        else if (item.id === 'magnet') pStats.magnetRadius = Math.round(pStats.magnetRadius * 1.2);

                        this.gameScene.updateUI();
                        this.gameScene.updateFireTimer();

                        this.time.delayedCall(300, () => {
                            this.scene.resume('GameScene');
                            this.scene.stop();
                        });
                    });
                });
            }
        }

        // ==========================================
        // 4-1. Skill Shop Scene
        // ==========================================
        class SkillShopScene extends Phaser.Scene {
            constructor() { super({ key: 'SkillShopScene' }); }
            create() {
                this.add.rectangle(this.scale.width / 2, this.scale.height / 2, this.scale.width, this.scale.height, 0x000000, 0.85);
                this.add.text(this.scale.width / 2, 120, '스킬 상점', { fontSize: '48px', fill: '#ffd700', fontStyle: 'bold' }).setOrigin(0.5);
                this.add.text(this.scale.width / 2, 300, '구현 준비 중입니다...\n\n(모은 골드를 소모하여 액티브 스킬 구매)', { fontSize: '28px', fill: '#fff', align: 'center', lineHeight: 1.5 }).setOrigin(0.5);

                let closeBtn = this.add.text(this.scale.width / 2, 550, '닫기 (게임 재개)', { fontSize: '28px', fill: '#fff', backgroundColor: '#555', padding: { x: 20, y: 10 } }).setOrigin(0.5).setInteractive();
                closeBtn.on('pointerdown', () => {
                    this.scene.stop();
                    this.scene.resume('GameScene');
                });
            }
        }

        // ==========================================
        // 5. Game Scene (인게임 핵심 로직)
        // ==========================================
        class GameScene extends Phaser.Scene {
            constructor() { super({ key: 'GameScene' }); }

            init(data) {
                this.stageData = data.stageData;
                this.elapsedTime = 0;
                this.lastFacing = 'down'; // 바라보는 방향 (up, down, left, right)
                
                this.playerStats = {
                    hp: 100, maxHp: 100, speed: 180, damage: 3, // 기본 수리검 데미지 3
                    level: 1, exp: 0, nextExp: 15, gold: 0,
                    projectileCount: 1, fireRate: 1600,
                    penetration: 0, magnetRadius: 180,
                    skills: {
                        katon: { lvl: 0 },
                        suiton: { lvl: 0 },
                        fuuton: { lvl: 0 },
                        bomb: { lvl: 0 }
                    }
                };
                this.enemyBaseHp = 10; // 기본 슬라임 HP 10 (스킬 3~4강 시 원샷 가능)
                this.isInvincible = false; 
            }

            create() {
                this.physics.world.setBounds(0, 0, 16000, 16000);

                if (this.stageData.id === 1) {
                    // 1. 기본 잔디 타일 스케일 0.25 (타일 입자를 더 촘촘하고 작게 축소)
                    this.add.tileSprite(8000, 8000, 16000, 16000, 'grass1')
                        .setTileScale(0.25, 0.25).setDepth(-10); 
                    
                    // 2. 흙길(grass5) 축소 스케일에 맞춰 64px 간격으로 촘촘히 연결
                    for (let x = 0; x < 16000; x += 64) {
                        this.add.image(x, 8000, 'grass5').setDepth(-9).setScale(0.25);
                    }
                    for (let y = 0; y < 16000; y += 64) {
                        this.add.image(8000, y, 'grass5').setDepth(-9).setScale(0.25);
                    }

                    // 3. 장식용 요소 (grass3, grass4, rock1, rock2) 축소 적용
                    const decoKeys = ['grass3', 'grass4', 'rock1', 'rock2'];
                    for (let i = 0; i < 500; i++) {
                        let rx = Phaser.Math.Between(0, 16000);
                        let ry = Phaser.Math.Between(0, 16000);
                        this.add.image(rx, ry, Phaser.Utils.Array.GetRandom(decoKeys)).setDepth(-8).setScale(0.25);
                    }

                    // 4. 장애물 (나무 2배 확대 & 숲 클러스터 구역)
                    this.obstacles = this.physics.add.staticGroup();
                    
                    // 숲 클러스터 생성 (5개 지점에 나무 10개씩 뭉침)
                    for (let c = 0; c < 8; c++) {
                        let cx = Phaser.Math.Between(1000, 15000);
                        let cy = Phaser.Math.Between(1000, 15000);
                        if (Math.abs(cx - 8000) < 600 && Math.abs(cy - 8000) < 600) continue;

                        for (let t = 0; t < 10; t++) {
                            let tx = cx + Phaser.Math.Between(-150, 150);
                            let ty = cy + Phaser.Math.Between(-150, 150);
                            let tree = this.obstacles.create(tx, ty, Math.random() > 0.5 ? 'tree1' : 'tree2');
                            tree.setScale(0.8); // 2배 확대 적용
                            tree.refreshBody();
                            tree.body.setSize(tree.width * 0.25, tree.height * 0.15); // 밑동만 충돌
                            tree.body.setOffset(tree.width * 0.375, tree.height * 0.85);
                            tree.setDepth(tree.y);
                        }
                    }

                    // 개별 바위(rock3) 배치
                    for (let i = 0; i < 60; i++) {
                        let rx = Phaser.Math.Between(500, 15500);
                        let ry = Phaser.Math.Between(500, 15500);
                        if (Math.abs(rx - 8000) < 500 && Math.abs(ry - 8000) < 500) continue;
                        let rock = this.obstacles.create(rx, ry, 'rock3');
                        rock.setScale(0.3);
                        rock.refreshBody();
                        rock.body.setSize(rock.width * 0.4, rock.height * 0.3);
                        rock.body.setOffset(rock.width * 0.3, rock.height * 0.7);
                        rock.setDepth(rock.y);
                    }
                }

                // 5. 주인공 중앙 스폰
                this.player = this.physics.add.sprite(8000, 8000, 'hero_1');
                this.player.setScale(0.8); 
                this.player.setCollideWorldBounds(true);
                this.player.setSize(this.player.width * 0.5, this.player.height * 0.4);
                this.player.setOffset(this.player.width * 0.25, this.player.height * 0.6);

                this.cameras.main.startFollow(this.player, true, 0.1, 0.1);

                // 입력 및 그룹
                this.cursors = this.input.keyboard.createCursorKeys();
                this.wasd = this.input.keyboard.addKeys({
                    up: Phaser.Input.Keyboard.KeyCodes.W, down: Phaser.Input.Keyboard.KeyCodes.S,
                    left: Phaser.Input.Keyboard.KeyCodes.A, right: Phaser.Input.Keyboard.KeyCodes.D
                });

                this.enemies = this.physics.add.group();
                this.weapons = this.physics.add.group();
                this.drops = this.physics.add.group();

                // 장애물 물리 충돌 연동 (플레이어 및 몬스터 모두 막힘)
                if (this.stageData.id === 1) {
                    this.physics.add.collider(this.player, this.obstacles);
                    this.physics.add.collider(this.enemies, this.obstacles);
                }

                this.physics.add.overlap(this.weapons, this.enemies, this.hitEnemy, null, this);
                this.physics.add.overlap(this.player, this.enemies, this.takeDamage, null, this);

                // 타이머 및 그래픽
                this.time.addEvent({ delay: 1000, callback: this.updateGameLogic, callbackScope: this, loop: true });
                this.time.addEvent({ delay: 1000, callback: this.spawnEnemies, callbackScope: this, loop: true });
                this.updateFireTimer();

                this.enemyHpGraphics = this.add.graphics().setDepth(9999);
                this.createUI();
            }

            updateFireTimer() {
                if (this.fireEvent) this.fireEvent.remove(false);
                this.fireEvent = this.time.addEvent({ delay: this.playerStats.fireRate, callback: this.fireWeapon, callbackScope: this, loop: true });
            }

            createUI() {
                this.timerText = this.add.text(this.scale.width / 2, 30, '00:00', { fontSize: '32px', fill: '#fff', fontStyle: 'bold', stroke: '#000', strokeThickness: 4 }).setOrigin(0.5).setScrollFactor(0).setDepth(10000);
                
                this.add.text(150, 20, 'HP', { fontSize: '14px', fill: '#fff' }).setOrigin(0, 0.5).setScrollFactor(0).setDepth(10000);
                this.hpBarBg = this.add.rectangle(150, 40, 200, 20, 0x555555).setOrigin(0, 0.5).setScrollFactor(0).setDepth(9999);
                this.hpBarFill = this.add.rectangle(150, 40, 200, 20, 0xff0000).setOrigin(0, 0.5).setScrollFactor(0).setDepth(9999);
                this.hpText = this.add.text(250, 40, '100 / 100', { fontSize: '16px', fill: '#fff' }).setOrigin(0.5).setScrollFactor(0).setDepth(10000);

                this.expBarBg = this.add.rectangle(this.scale.width/2, this.scale.height - 20, this.scale.width - 40, 15, 0x333333).setOrigin(0.5).setScrollFactor(0).setDepth(9999);
                this.expBarFill = this.add.rectangle(20, this.scale.height - 20, 0, 15, 0x00aaff).setOrigin(0, 0.5).setScrollFactor(0).setDepth(9999);
                this.lvlText = this.add.text(20, this.scale.height - 40, 'Lv.1', { fontSize: '20px', fill: '#fff', fontStyle: 'bold', stroke: '#000', strokeThickness: 3 }).setScrollFactor(0).setDepth(10000);

                this.goldText = this.add.text(this.scale.width - 150, 30, '💰 0', { fontSize: '28px', fill: '#ffd700', stroke: '#000', strokeThickness: 4 }).setOrigin(0.5).setScrollFactor(0).setDepth(10000).setInteractive();
                this.goldText.on('pointerdown', () => {
                    this.scene.pause();
                    this.scene.launch('SkillShopScene');
                });
            }

            update() {
                let velocityX = 0; let velocityY = 0;

                if (this.cursors.left.isDown || this.wasd.left.isDown) velocityX = -1;
                else if (this.cursors.right.isDown || this.wasd.right.isDown) velocityX = 1;

                if (this.cursors.up.isDown || this.wasd.up.isDown) velocityY = -1;
                else if (this.cursors.down.isDown || this.wasd.down.isDown) velocityY = 1;

                if (velocityX !== 0 && velocityY !== 0) { velocityX *= Math.SQRT1_2; velocityY *= Math.SQRT1_2; }

                this.player.body.setVelocity(velocityX * this.playerStats.speed, velocityY * this.playerStats.speed);

                if (velocityY > 0) { this.player.setTexture('hero_1'); this.lastFacing = 'down'; }
                else if (velocityY < 0) { this.player.setTexture('hero_2'); this.lastFacing = 'up'; }
                else if (velocityX < 0) { this.player.setTexture('hero_3'); this.lastFacing = 'left'; }
                else if (velocityX > 0) { this.player.setTexture('hero_4'); this.lastFacing = 'right'; }

                this.player.setDepth(this.player.y);

                // 몬스터 AI 추적
                this.enemies.getChildren().forEach(enemy => {
                    if (enemy.active) {
                        this.physics.moveToObject(enemy, this.player, enemy.speed);
                        enemy.setDepth(enemy.y);
                        
                        let type = enemy.monsterType; 
                        let vx = enemy.body.velocity.x;
                        let vy = enemy.body.velocity.y;

                        if (Math.abs(vx) > Math.abs(vy)) enemy.setTexture(vx > 0 ? type + '4' : type + '3');
                        else enemy.setTexture(vy > 0 ? type + '1' : type + '2');
                    }
                });

                // 드랍 아이템 자석 흡수
                this.drops.getChildren().forEach(drop => {
                    if (drop.active) {
                        let dist = Phaser.Math.Distance.Between(this.player.x, this.player.y, drop.x, drop.y);
                        if (dist < this.playerStats.magnetRadius) {
                            this.physics.moveToObject(drop, this.player, 450); 
                        } else {
                            drop.body.setVelocity(0, 0); 
                        }

                        if (dist < 30) this.collectDrop(this.player, drop);
                    }
                });

                // 몬스터 체력바
                this.enemyHpGraphics.clear();
                this.enemies.getChildren().forEach(enemy => {
                    if (enemy.active && enemy.maxHp > 1) {
                        let barWidth = 30; let barHeight = 4;
                        let x = enemy.x - barWidth / 2; let y = enemy.y - 25;
                        let hpRatio = Math.max(0, enemy.hp / enemy.maxHp);
                        
                        this.enemyHpGraphics.fillStyle(0x000000, 0.8);
                        this.enemyHpGraphics.fillRect(x, y, barWidth, barHeight);
                        this.enemyHpGraphics.fillStyle(0xff0000, 1);
                        this.enemyHpGraphics.fillRect(x, y, barWidth * hpRatio, barHeight);
                    }
                });
            }

            updateGameLogic() {
                this.elapsedTime++;
                let mins = Math.floor(this.elapsedTime / 60);
                let secs = this.elapsedTime % 60;
                this.timerText.setText(`${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`);

                // 나루토 신규 액티브 스킬 자동 발사 타이머 연산
                this.handleNinjaSkills();

                if (this.elapsedTime === 600) this.spawnBossWarning();
            }

            handleNinjaSkills() {
                let sk = this.playerStats.skills;
                
                // 1. 화둔 (불뿜기): Lv1=4.5, Lv2=7, Lv3=9.5, Lv4=12 (기본 HP 10 슬라임을 3번 강화해야 원샷)
                if (sk.katon.lvl > 0 && this.elapsedTime % 4 === 0) {
                    let flame = this.add.circle(this.player.x, this.player.y, 50 + sk.katon.lvl * 10, 0xff4500, 0.4);
                    this.physics.add.existing(flame);
                    
                    let offset = 70;
                    if (this.lastFacing === 'up') flame.y -= offset;
                    else if (this.lastFacing === 'down') flame.y += offset;
                    else if (this.lastFacing === 'left') flame.x -= offset;
                    else if (this.lastFacing === 'right') flame.x += offset;

                    let dmg = 2 + sk.katon.lvl * 2.5;
                    this.physics.add.overlap(flame, this.enemies, (f, e) => {
                        if (!e.active || f.hitEnemies?.includes(e)) return;
                        if (!f.hitEnemies) f.hitEnemies = [];
                        f.hitEnemies.push(e);

                        e.hp -= dmg;
                        e.setTint(0xff8800);
                        this.time.delayedCall(100, () => { if(e.active) e.clearTint(); });
                        if (e.hp <= 0) { e.setActive(false).setVisible(false); this.spawnDrop(e.x, e.y); }
                    });

                    this.tweens.add({ targets: flame, alpha: 0, scale: 1.2, duration: 600, onComplete: () => flame.destroy() });
                }

                // 2. 수둔 (수룡탄): 가장 가까운 적에게 폭발 (Lv1=5, Lv2=7.5, Lv3=10, Lv4=12.5)
                if (sk.suiton.lvl > 0 && this.elapsedTime % 5 === 0) {
                    let activeEnemies = this.enemies.getChildren().filter(e => e.active);
                    if (activeEnemies.length > 0) {
                        let target = activeEnemies[0];
                        let dragon = this.add.circle(this.player.x, this.player.y, 15, 0x00bfff, 0.8);
                        this.physics.add.existing(dragon);
                        this.physics.moveToObject(dragon, target, 400);

                        let dmg = 2.5 + sk.suiton.lvl * 2.5;
                        this.physics.add.overlap(dragon, this.enemies, (d, e) => {
                            if (!d.active || !e.active) return;
                            d.setActive(false).setVisible(false).destroy();

                            let splash = this.add.circle(e.x, e.y, 40 + sk.suiton.lvl * 8, 0x00ffff, 0.5);
                            this.physics.add.existing(splash);
                            this.physics.add.overlap(splash, this.enemies, (s, targetEnemy) => {
                                if (!targetEnemy.active) return;
                                targetEnemy.hp -= dmg;
                                targetEnemy.setTint(0x00ffff);
                                this.time.delayedCall(100, () => { if(targetEnemy.active) targetEnemy.clearTint(); });
                                if (targetEnemy.hp <= 0) { targetEnemy.setActive(false).setVisible(false); this.spawnDrop(targetEnemy.x, targetEnemy.y); }
                            });
                            this.tweens.add({ targets: splash, alpha: 0, scale: 1.3, duration: 300, onComplete: () => splash.destroy() });
                        });
                    }
                }

                // 3. 풍둔 (나선 수리검): 관통 다단히트 (Lv1=3.5, Lv2=6, Lv3=8.5, Lv4=11)
                if (sk.fuuton.lvl > 0 && this.elapsedTime % 6 === 0) {
                    let activeEnemies = this.enemies.getChildren().filter(e => e.active);
                    if (activeEnemies.length > 0) {
                        let target = activeEnemies[0];
                        let rasen = this.add.circle(this.player.x, this.player.y, 25 + sk.fuuton.lvl * 5, 0x00ff7f, 0.6);
                        this.physics.add.existing(rasen);
                        this.physics.moveToObject(rasen, target, 200);

                        let dmg = 1 + sk.fuuton.lvl * 2.5;
                        rasen.hitEnemies = [];
                        this.physics.add.overlap(rasen, this.enemies, (r, e) => {
                            if (!e.active || r.hitEnemies.includes(e)) return;
                            r.hitEnemies.push(e);
                            e.hp -= dmg;
                            e.setTint(0x00ff7f);
                            this.time.delayedCall(100, () => { if(e.active) e.clearTint(); });
                            if (e.hp <= 0) { e.setActive(false).setVisible(false); this.spawnDrop(e.x, e.y); }
                        });
                        this.tweens.add({ targets: rasen, alpha: 0, duration: 2500, onComplete: () => rasen.destroy() });
                    }
                }

                // 4. 기폭찰: 명중 시 스플래시 폭발 (Lv1=4, Lv2=6.5, Lv3=9, Lv4=11.5)
                if (sk.bomb.lvl > 0 && this.elapsedTime % 4 === 0) {
                    let activeEnemies = this.enemies.getChildren().filter(e => e.active);
                    if (activeEnemies.length > 0) {
                        let target = activeEnemies[0];
                        let bombSuri = this.add.circle(this.player.x, this.player.y, 10, 0xffd700, 1);
                        this.physics.add.existing(bombSuri);
                        this.physics.moveToObject(bombSuri, target, 500);

                        let dmg = 1.5 + sk.bomb.lvl * 2.5;
                        this.physics.add.overlap(bombSuri, this.enemies, (b, e) => {
                            if (!b.active || !e.active) return;
                            b.setActive(false).setVisible(false).destroy();

                            let exp = this.add.circle(e.x, e.y, 50 + sk.bomb.lvl * 10, 0xff0000, 0.6);
                            this.physics.add.existing(exp);
                            this.physics.add.overlap(exp, this.enemies, (ex, targetEnemy) => {
                                if (!targetEnemy.active) return;
                                targetEnemy.hp -= dmg;
                                targetEnemy.setTint(0xff0000);
                                this.time.delayedCall(100, () => { if(targetEnemy.active) targetEnemy.clearTint(); });
                                if (targetEnemy.hp <= 0) { targetEnemy.setActive(false).setVisible(false); this.spawnDrop(targetEnemy.x, targetEnemy.y); }
                            });
                            this.tweens.add({ targets: exp, alpha: 0, scale: 1.4, duration: 400, onComplete: () => exp.destroy() });
                        });
                    }
                }
            }

            spawnEnemies() {
                let spawnCount = 3; 
                if (this.elapsedTime > 180) spawnCount += Math.floor((this.elapsedTime - 180) / 10) * 3;

                // 기본 슬라임 체력 10, 3분(180초) 이후 15초마다 체력 +2씩 증가
                let hp = this.enemyBaseHp;
                if (this.elapsedTime > 180) hp += Math.floor((this.elapsedTime - 180) / 15) * 2; 

                for (let i = 0; i < spawnCount; i++) {
                    let cam = this.cameras.main;
                    let angle = Phaser.Math.Between(0, 360) * Phaser.Math.DEG_TO_RAD;
                    let dist = Phaser.Math.Between(cam.width/2 + 200, cam.width/2 + 400);
                    let sx = this.player.x + Math.cos(angle) * dist;
                    let sy = this.player.y + Math.sin(angle) * dist;

                    let type = Math.random() > 0.5 ? 'sli' : 'ssli';
                    let enemy = this.enemies.get(sx, sy, type + '1');
                    if (enemy) {
                        enemy.setActive(true).setVisible(true);
                        enemy.monsterType = type;
                        enemy.maxHp = hp; enemy.hp = hp;
                        enemy.speed = Phaser.Math.Between(80, 110);
                        enemy.setScale(0.5);
                        enemy.setCircle(enemy.width * 0.4);
                    }
                }
            }

            fireWeapon() {
                let activeEnemies = this.enemies.getChildren().filter(e => e.active);
                if (activeEnemies.length === 0) return;

                let target = null; let minDist = 999999;
                activeEnemies.forEach(e => {
                    let d = Phaser.Math.Distance.Between(this.player.x, this.player.y, e.x, e.y);
                    if (d < minDist) { minDist = d; target = e; }
                });

                if (target) {
                    let baseAngle = Phaser.Math.Angle.Between(this.player.x, this.player.y, target.x, target.y);
                    let pCount = this.playerStats.projectileCount;

                    for (let i = 0; i < pCount; i++) {
                        let weapon = this.weapons.get(this.player.x, this.player.y, 'suri');
                        if (weapon) {
                            weapon.setActive(true).setVisible(true);
                            weapon.hitEnemies = [];
                            weapon.hitsLeft = this.playerStats.penetration; // 관통 횟수 지정
                            weapon.setScale(0.26); // 30% 확대
                            weapon.setDepth(10000);

                            let angleOffset = (i - (pCount - 1) / 2) * 0.2; 
                            let finalAngle = baseAngle + angleOffset;
                            
                            // 칼날 부분이 적을 바라보도록 회전 지정 (+90도 보정)
                            weapon.rotation = finalAngle + Math.PI / 2;
                            
                            let speed = 600;
                            weapon.body.velocity.x = Math.cos(finalAngle) * speed;
                            weapon.body.velocity.y = Math.sin(finalAngle) * speed;
                            
                            this.time.delayedCall(2500, () => {
                                if (weapon.active) { weapon.setActive(false).setVisible(false); }
                            });
                        }
                    }
                }
            }

            hitEnemy(weapon, enemy) {
                if (!weapon.active || !enemy.active) return;
                if (weapon.hitEnemies.includes(enemy)) return;
                
                weapon.hitEnemies.push(enemy);
                enemy.hp -= this.playerStats.damage;
                
                enemy.setTint(0xff0000);
                this.time.delayedCall(100, () => { if(enemy.active) enemy.clearTint(); });

                if (enemy.hp <= 0) {
                    enemy.setActive(false).setVisible(false);
                    this.spawnDrop(enemy.x, enemy.y);
                }

                // 관통 횟수 소진 시 소멸
                if (weapon.hitsLeft <= 0) {
                    weapon.setActive(false).setVisible(false);
                } else {
                    weapon.hitsLeft--;
                }
            }

            spawnDrop(x, y) {
                let dropType = Math.random() < 0.1 ? 'sli_drop3' : 'sli_drop1';
                let drop = this.drops.get(x, y, dropType);
                if (drop) {
                    drop.setActive(true).setVisible(true);
                    drop.dropType = dropType;
                    drop.setScale(0.5);
                }
            }

            takeDamage(player, enemy) {
                if (!enemy.active || this.isInvincible) return;

                this.playerStats.hp -= 10;
                this.updateUI();

                if (this.playerStats.hp <= 0) {
                    this.physics.pause();
                    
                    let goText = this.add.text(this.scale.width / 2, this.scale.height / 2, 'GAME OVER', { 
                        fontSize: '100px', fill: '#ff0000', fontStyle: 'bold', stroke: '#000', strokeThickness: 10 
                    }).setOrigin(0.5).setScrollFactor(0).setDepth(20000);
                    
                    this.time.delayedCall(3000, () => {
                        this.scene.start('StageSelectScene');
                    });
                    return;
                }

                this.isInvincible = true;
                this.tweens.add({
                    targets: this.player, alpha: 0.2, duration: 100, yoyo: true, repeat: 4,
                    onComplete: () => { this.player.alpha = 1; this.isInvincible = false; }
                });
            }

            collectDrop(player, drop) {
                if (!drop.active) return;
                drop.setActive(false).setVisible(false);

                if (drop.dropType === 'sli_drop1') {
                    this.playerStats.exp += 1;
                    if (this.playerStats.exp >= this.playerStats.nextExp) {
                        this.playerStats.level++;
                        this.playerStats.exp = 0;
                        this.playerStats.nextExp = Math.floor(this.playerStats.nextExp * 1.5); 
                        
                        let lvupText = this.add.text(this.player.x, this.player.y - 60, 'LEVEL UP!', { fontSize:'28px', fill:'#0f0', fontStyle:'bold', stroke:'#000', strokeThickness:4 }).setOrigin(0.5).setDepth(10000);
                        this.tweens.add({ targets: lvupText, y: lvupText.y - 80, alpha: 0, duration: 1500, onComplete: () => lvupText.destroy() });
                        
                        this.scene.pause();
                        this.scene.launch('LevelUpScene', { scene: this });
                    }
                } else if (drop.dropType === 'sli_drop3') {
                    this.playerStats.gold += 10; 
                }

                this.updateUI();
            }

            updateUI() {
                let hpRatio = Math.max(0, this.playerStats.hp / this.playerStats.maxHp);
                this.hpBarFill.width = 200 * hpRatio;
                this.hpText.setText(`${this.playerStats.hp} / ${this.playerStats.maxHp}`);

                let expRatio = this.playerStats.exp / this.playerStats.nextExp;
                let maxBarWidth = this.scale.width - 40;
                this.expBarFill.width = maxBarWidth * expRatio;
                this.lvlText.setText(`Lv.${this.playerStats.level}`);

                this.goldText.setText(`💰 ${this.playerStats.gold}`);
            }

            spawnBossWarning() {
                let overlay = this.add.rectangle(0, 0, this.scale.width, this.scale.height, 0xff0000, 0.4)
                    .setOrigin(0,0).setScrollFactor(0).setDepth(10000);
                
                let warningText = this.add.text(this.scale.width/2, this.scale.height/2, '경고\n거대한 몬스터의 기운이 느껴집니다...', { 
                    fontSize: '48px', fill: '#fff', align: 'center', fontStyle: 'bold', stroke: '#000', strokeThickness: 5 
                }).setOrigin(0.5).setScrollFactor(0).setDepth(10001);

                this.tweens.add({
                    targets: overlay, alpha: 0.1, duration: 500, yoyo: true, repeat: 5, 
                    onComplete: () => { overlay.destroy(); warningText.destroy(); }
                });
            }
        }

        // ==========================================
        // Phaser 설정 및 초기화
        // ==========================================
        const config = {
            type: Phaser.AUTO,
            parent: 'game-container',
            scale: {
                mode: Phaser.Scale.FIT,
                autoCenter: Phaser.Scale.CENTER_BOTH,
                width: 1280,
                height: 720
            },
            physics: {
                default: 'arcade',
                arcade: { debug: false }
            },
            scene: [PreloadScene, TitleScene, UpgradeScene, StageSelectScene, GameScene, LevelUpScene, SkillShopScene]
        };

        const game = new Phaser.Game(config);
    </script>
</body>
</html>
