<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NCS SURVIVE - {{ username }}님</title>
    <!-- Phaser 3 최신 CDN -->
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #111;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
        #game-container {
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>
    <div id="game-container"></div>

    <script>
        // 전역 씬(Scene) 공통 함수: 스피커 음소거 버튼 생성
        Phaser.Scene.prototype.createMuteButton = function() {
            let icon = this.sound.mute ? '🔇' : '🔊';
            let muteBtn = this.add.text(this.scale.width - 50, 30, icon, { fontSize: '40px' })
                .setOrigin(0.5).setInteractive().setScrollFactor(0).setDepth(10000);
                
            muteBtn.on('pointerdown', () => {
                this.sound.mute = !this.sound.mute; // 글로벌 뮤트 토글
                muteBtn.setText(this.sound.mute ? '🔇' : '🔊');
            });
        };

        // ==========================================
        // 0. Preload Scene (이미지 및 사운드 리소스 로드)
        // ==========================================
        class PreloadScene extends Phaser.Scene {
            constructor() { super({ key: 'PreloadScene' }); }

            preload() {
                this.add.text(this.scale.width / 2, this.scale.height / 2, '로딩 중...', { fontSize: '32px', fill: '#fff' }).setOrigin(0.5);

                // --- [이미지 로드 (확장자 .png 통일)] ---
                this.load.image('main_bg', '/static/img/survive/main.png'); 
                
                this.load.image('btn_start', '/static/img/survive/game_start.png');
                this.load.image('btn_upgrade', '/static/img/survive/game_upgrade.png');

                // 4방향 주인공 이미지 로드
                this.load.image('hero_1', '/static/img/survive/hero/hero_1.png');
                this.load.image('hero_2', '/static/img/survive/hero/hero_2.png');
                this.load.image('hero_3', '/static/img/survive/hero/hero_3.png');
                this.load.image('hero_4', '/static/img/survive/hero/hero_4.png');

                // 타일 및 장식 요소
                this.load.image('grass1', '/static/img/survive/tile/grass1.png');
                this.load.image('grass2', '/static/img/survive/tile/grass2.png');
                this.load.image('grass3', '/static/img/survive/tile/grass3.png');
                this.load.image('grass4', '/static/img/survive/tile/grass4.png');
                this.load.image('grass5', '/static/img/survive/tile/grass5.png');
                
                this.load.image('rock1', '/static/img/survive/tile/rock1.png');
                this.load.image('rock2', '/static/img/survive/tile/rock2.png');
                this.load.image('rock3', '/static/img/survive/tile/rock3.png');
                this.load.image('tree1', '/static/img/survive/tile/tree1.png');
                this.load.image('tree2', '/static/img/survive/tile/tree2.png');
                
                this.load.image('branch', '/static/img/survive/tile/branch.png'); 
                this.load.image('mushroom', '/static/img/survive/tile/mushroom.png'); 

                // --- [오디오 로드] ---
                this.load.audio('bgm_main', '/static/bgm/survive/survive_main.mp3');
            }
            create() { this.scene.start('TitleScene'); }
        }

        // ==========================================
        // 1. Title Scene (메인 화면: 시작, 강화)
        // ==========================================
        class TitleScene extends Phaser.Scene {
            constructor() { super({ key: 'TitleScene' }); }

            create() {
                // BGM 재생 (브라우저 정책상 유저 상호작용 후 소리가 날 수 있음)
                if (!this.sound.get('bgm_main')) {
                    this.sound.play('bgm_main', { loop: true, volume: 0.5 });
                }

                // 메인 배경 이미지 출력
                let bg = this.add.image(this.scale.width / 2, this.scale.height / 2, 'main_bg');
                bg.setDisplaySize(this.scale.width, this.scale.height);

                // 스피커 음소거 버튼 생성
                this.createMuteButton();

                // --- [시작 버튼] ---
                let startBtn = this.add.image(this.scale.width / 2 - 150, this.scale.height - 150, 'btn_start').setInteractive();
                startBtn.setDisplaySize(150, 150); 
                
                startBtn.on('pointerover', () => startBtn.setTint(0xcccccc)); 
                startBtn.on('pointerout', () => startBtn.clearTint()); 
                startBtn.on('pointerdown', () => this.scene.start('StageSelectScene'));

                // --- [강화 버튼] ---
                let upgradeBtn = this.add.image(this.scale.width / 2 + 150, this.scale.height - 150, 'btn_upgrade').setInteractive();
                upgradeBtn.setDisplaySize(150, 150); 
                
                upgradeBtn.on('pointerover', () => upgradeBtn.setTint(0xcccccc));
                upgradeBtn.on('pointerout', () => upgradeBtn.clearTint());
                upgradeBtn.on('pointerdown', () => this.scene.start('UpgradeScene'));
            }
        }

        // ==========================================
        // 2. Upgrade Scene (무기 강화 화면)
        // ==========================================
        class UpgradeScene extends Phaser.Scene {
            constructor() { super({ key: 'UpgradeScene' }); }

            create() {
                this.createMuteButton(); // 스피커 버튼

                this.add.text(this.scale.width / 2, 100, '무기 강화소', { fontSize: '48px', fill: '#ffcc00' }).setOrigin(0.5);
                this.add.text(this.scale.width / 2, 300, '구현 예정 (골드 소모하여 영구 스탯 증가)', { fontSize: '24px', fill: '#fff' }).setOrigin(0.5);

                let backBtn = this.add.text(this.scale.width / 2, 500, '뒤로가기', {
                    fontSize: '32px', fill: '#fff', backgroundColor: '#555', padding: { x: 20, y: 10 }
                }).setOrigin(0.5).setInteractive();

                backBtn.on('pointerdown', () => this.scene.start('TitleScene'));
            }
        }

        // ==========================================
        // 3. Stage Select Scene
        // ==========================================
        class StageSelectScene extends Phaser.Scene {
            constructor() { super({ key: 'StageSelectScene' }); }

            create() {
                this.createMuteButton(); // 스피커 버튼

                this.add.text(this.scale.width / 2, 80, '스테이지 선택', { fontSize: '48px', fill: '#fff' }).setOrigin(0.5);

                const stages = [
                    { id: 1, name: 'Stage 1: 평온한 숲', time: 600 },
                    { id: 2, name: 'Stage 2: 어둠의 묘지', time: 720 },
                    { id: 3, name: 'Stage 3: 작열하는 화산', time: 900 },
                    { id: 4, name: 'Stage 4: 심연의 끝', time: 1020 },
                    { id: 5, name: 'Stage 5: 잊혀진 신전', time: 1200 },
                    { id: 6, name: 'Stage 6: 종말의 차원', time: 1800 }
                ];

                stages.forEach((stage, index) => {
                    let col = index % 3;
                    let row = Math.floor(index / 3);
                    let cardX = (this.scale.width / 2) - 300 + (col * 300);
                    let cardY = 280 + (row * 200); 

                    let bossPlaceholder = this.add.rectangle(cardX, cardY - 40, 100, 100, 0x666666).setStrokeStyle(2, 0xffffff);
                    let infoText = this.add.text(cardX, cardY + 40, `${stage.name}\n(보스: ${stage.time / 60}분)`, {
                        fontSize: '20px', fill: '#0f0', align: 'center'
                    }).setOrigin(0.5);

                    let hitBox = this.add.rectangle(cardX, cardY, 220, 180, 0x333333, 0.8).setStrokeStyle(2, 0xaaaaaa);
                    hitBox.setInteractive();
                    
                    this.add.container(0, 0, [hitBox, bossPlaceholder, infoText]);

                    hitBox.on('pointerover', () => hitBox.setFillStyle(0x555555));
                    hitBox.on('pointerout', () => hitBox.setFillStyle(0x333333));
                    hitBox.on('pointerdown', () => this.scene.start('GameScene', { stageData: stage }));
                });

                let backBtn = this.add.text(this.scale.width / 2, this.scale.height - 80, '메인 메뉴로', {
                    fontSize: '28px', fill: '#fff', backgroundColor: '#555', padding: { x: 20, y: 10 }
                }).setOrigin(0.5).setInteractive();

                backBtn.on('pointerdown', () => this.scene.start('TitleScene'));
            }
        }

        // ==========================================
        // 4. Game Scene (인게임 화면)
        // ==========================================
        class GameScene extends Phaser.Scene {
            constructor() { super({ key: 'GameScene' }); }

            init(data) {
                this.stageData = data.stageData;
                this.elapsedTime = 0;
                this.playerStats = { hp: 50, maxHp: 50, speed: 200, damage: 1 };
                this.enemyBaseHp = 1; 
            }

            create() {
                this.physics.world.setBounds(0, 0, 4000, 4000);

                if (this.stageData.id === 1) {
                    // 기본 잔디 바닥 (grass1 이미지를 4000x4000 영역에 타일링하여 반복)
                    this.add.tileSprite(2000, 2000, 4000, 4000, 'grass1').setDepth(0);

                    // 장식 흩뿌리기 (개수 및 크기 조절)
                    const decoKeys = ['grass2', 'grass3', 'grass4', 'grass5', 'branch', 'mushroom'];
                    for (let i = 0; i < 250; i++) { // 개수 축소 (400 -> 250)
                        let rx = Phaser.Math.Between(0, 4000);
                        let ry = Phaser.Math.Between(0, 4000);
                        let deco = this.add.image(rx, ry, Phaser.Utils.Array.GetRandom(decoKeys)).setDepth(1);
                        deco.setScale(0.7); // 장식 크기 대폭 축소
                    }

                    // 충돌 장애물 배치 (나무, 바위 - 개수 및 크기 조절, 충돌 박스 최적화)
                    this.obstacles = this.physics.add.staticGroup();
                    const obstacleKeys = ['tree1', 'tree2', 'rock1', 'rock2', 'rock3'];
                    for (let i = 0; i < 60; i++) { // 개수 축소 (150 -> 60)
                        let rx = Phaser.Math.Between(100, 3900); 
                        let ry = Phaser.Math.Between(100, 3900);
                        // 시작지점(2000, 2000) 주변은 안전구역 (반경 확장)
                        if (Math.abs(rx - 2000) < 400 && Math.abs(ry - 2000) < 400) continue;

                        let obs = this.obstacles.create(rx, ry, Phaser.Utils.Array.GetRandom(obstacleKeys));
                        obs.setScale(0.8); // 장애물 크기 축소

                        // [중요] 충돌 히트박스 최적화 (하단만 닿게 설정)
                        // 이미지의 실제 크기에 따라 조절이 필요할 수 있습니다.
                        let originalWidth = obs.width;
                        let originalHeight = obs.height;
                        
                        // 충돌 박스를 너비 80%, 높이 30%로 줄이고, Y축을 하단으로 이동
                        obs.setSize(originalWidth * 0.8, originalHeight * 0.3);
                        obs.setOffset(originalWidth * 0.1, originalHeight * 0.6); 
                        
                        obs.setDepth(obs.y); // Y-Sorting
                    }
                } else {
                    this.add.grid(2000, 2000, 4000, 4000, 64, 64, 0x222222).setAltFillStyle(0x2a2a2a).setOutlineStyle();
                }

                // 주인공 생성
                this.player = this.physics.add.sprite(2000, 2000, 'hero_1');
                this.player.setScale(0.6); // 플레이어 크기 적절히 조절 (확인 후 수정)
                this.player.setCollideWorldBounds(true);
                
                // 플레이어 충돌 히트박스 최적화 (발 부분만 충돌하도록)
                let pw = this.player.width;
                let ph = this.player.height;
                this.player.setSize(pw * 0.6, ph * 0.4);
                this.player.setOffset(pw * 0.2, ph * 0.5);
                this.wasd = this.input.keyboard.addKeys({
                    up: Phaser.Input.Keyboard.KeyCodes.W,
                    down: Phaser.Input.Keyboard.KeyCodes.S,
                    left: Phaser.Input.Keyboard.KeyCodes.A,
                    right: Phaser.Input.Keyboard.KeyCodes.D
                });

                // 게임 타이머 이벤트
                this.time.addEvent({ delay: 1000, callback: this.updateGameLogic, callbackScope: this, loop: true });
            }

            update() {
                let velocityX = 0;
                let velocityY = 0;

                if (this.cursors.left.isDown || this.wasd.left.isDown) { velocityX = -1; }
                else if (this.cursors.right.isDown || this.wasd.right.isDown) { velocityX = 1; }

                if (this.cursors.up.isDown || this.wasd.up.isDown) { velocityY = -1; }
                else if (this.cursors.down.isDown || this.wasd.down.isDown) { velocityY = 1; }

                if (velocityX !== 0 && velocityY !== 0) {
                    velocityX *= Math.SQRT1_2;
                    velocityY *= Math.SQRT1_2;
                }

                this.player.body.setVelocity(velocityX * this.playerStats.speed, velocityY * this.playerStats.speed);

                // 4방향 이동 이미지 변경
                if (velocityY > 0) {
                    this.player.setTexture('hero_1'); // 아래
                } else if (velocityY < 0) {
                    this.player.setTexture('hero_2'); // 위
                } else if (velocityX < 0) {
                    this.player.setTexture('hero_3'); // 왼쪽
                } else if (velocityX > 0) {
                    this.player.setTexture('hero_4'); // 오른쪽
                }

                this.player.setDepth(this.player.y); // Y-Sorting
            }

            // 문제의 구문 에러를 수정한 함수 선언부
            updateGameLogic() {
                this.elapsedTime++;

                let mins = Math.floor(this.elapsedTime / 60);
                let secs = this.elapsedTime % 60;
                this.timerText.setText(`${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`);

                let currentEnemyHp = this.enemyBaseHp + Math.floor(this.elapsedTime / 60);

                if (this.elapsedTime === this.stageData.time) {
                    this.spawnBoss();
                }
            }

            spawnBoss() {
                let bossWarning = this.add.text(this.scale.width / 2, this.scale.height / 2, '⚠ 보스 출현 ⚠', { fontSize: '64px', fill: '#ff0000', fontStyle: 'bold', stroke: '#fff', strokeThickness: 6 })
                    .setOrigin(0.5).setScrollFactor(0).setDepth(9999);
                this.time.delayedCall(3000, () => bossWarning.destroy(), [], this);
            }
        }

        // ==========================================
        // Phaser 설정 및 초기화
        // ==========================================
        const config = {
            type: Phaser.AUTO,
            parent: 'game-container',
            scale: {
                mode: Phaser.Scale.FIT,
                autoCenter: Phaser.Scale.CENTER_BOTH,
                width: 1280,
                height: 720
            },
            physics: {
                default: 'arcade',
                arcade: { debug: false } 
            },
            scene: [PreloadScene, TitleScene, UpgradeScene, StageSelectScene, GameScene]
        };

        const game = new Phaser.Game(config);
    </script>
</body>
</html>
