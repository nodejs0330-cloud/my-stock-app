{% extends 'base.html' %}

{% block content %}

<!-- 로그인 스피너 (초기에는 숨김) -->
<div id="loading-overlay" class="fixed inset-0 bg-black/80 backdrop-blur-md z-[100] hidden flex-col items-center justify-center transition-opacity">
    <div class="animate-spin rounded-full h-16 w-16 border-t-4 border-b-4 border-blue-500 mb-4"></div>
    <h2 class="text-white text-xl font-bold tracking-widest animate-pulse">시스템 접속 중...</h2>
    <p class="text-gray-400 text-sm mt-2">안전한 통신망을 연결하고 있습니다.</p>
</div>

<!-- 고급스러운 느낌의 텍스트 영역 (명조/궁서체 느낌으로 고급화, 줄바꿈 자동 적용) -->
<div id="kitsch-text" class="absolute inset-0 flex flex-col items-center justify-center z-10 pointer-events-none transition-all duration-500">
    <h1 class="text-4xl md:text-6xl font-black text-white drop-shadow-[0_4px_4px_rgba(0,0,0,0.9)] tracking-tighter text-center transition-all duration-500">
        {{ main_text | safe }}
    </h1>
    
    <button id="show-login-btn" class="mt-12 pointer-events-auto bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-500 hover:to-indigo-500 text-white font-bold text-xl py-4 px-8 rounded-full shadow-[0_0_20px_rgba(59,130,246,0.8)] transform transition hover:scale-105 animate-pulse">
        로그인
    </button>
</div>

<!-- 로그인 폼 영역 -->
<div id="login-form-container" class="w-full max-w-md bg-gray-900/60 rounded-3xl shadow-[0_0_40px_rgba(0,0,0,0.7)] p-8 backdrop-blur-xl border border-white/20 relative z-20 mx-4 opacity-0 scale-95 pointer-events-none transition-all duration-500">
    
    <button id="close-login-btn" class="absolute top-4 right-5 text-gray-400 hover:text-white font-bold text-2xl transition-colors">&times;</button>

    <div class="flex justify-between items-center mb-8 pr-6">
        <h2 class="text-3xl font-bold text-white tracking-tight drop-shadow-md">로그인</h2>
        <div class="flex flex-col space-y-2">
            <button id="bg-toggle-btn" class="text-[10px] bg-indigo-600/80 hover:bg-indigo-500 text-white py-1 px-2 rounded-full transition-colors shadow-lg backdrop-blur-sm border border-indigo-400/30">
                🌌 배경변경
            </button>
            <button id="qr-toggle-btn" class="text-[10px] bg-blue-600/80 hover:bg-blue-500 text-white py-1 px-2 rounded-full transition-colors shadow-lg backdrop-blur-sm border border-blue-400/30">
                📱 QR 접속
            </button>
        </div>
    </div>

    <!-- 로그인/회원가입 에러나 완료 메시지만 노출되도록 유지 (관리자 페이지 작업은 이곳에 뜨지 않습니다) -->
    {% with messages = get_flashed_messages() %}
      {% if messages %}
        <div class="mb-4 bg-red-500/80 backdrop-blur-sm border border-red-400 text-white px-4 py-3 rounded-lg text-sm font-medium text-center shadow-lg">
          {{ messages[0] }}
        </div>
      {% endif %}
    {% endwith %}

    <form id="login-form" action="{{ url_for('index') }}" method="POST" class="space-y-6">
        <div>
            <label for="username" class="block text-sm font-medium text-gray-300 drop-shadow-md">아이디</label>
            <input type="text" id="username" name="username" required class="mt-1 block w-full bg-gray-800/80 border border-gray-600/50 rounded-xl shadow-inner py-3 px-4 text-white focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all backdrop-blur-sm" placeholder="아이디를 입력하세요">
        </div>
        <div>
            <label for="password" class="block text-sm font-medium text-gray-300 drop-shadow-md">비밀번호</label>
            <input type="password" id="password" name="password" required class="mt-1 block w-full bg-gray-800/80 border border-gray-600/50 rounded-xl shadow-inner py-3 px-4 text-white focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all backdrop-blur-sm" placeholder="••••••••">
        </div>
        <div class="pt-4">
            <button type="submit" id="submit-btn" class="w-full bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-500 hover:to-indigo-500 text-white font-bold py-3.5 px-4 rounded-xl focus:outline-none shadow-[0_4px_15px_rgba(59,130,246,0.5)] transform transition hover:-translate-y-1">
                시작하기
            </button>
        </div>
    </form>
    <div class="mt-6 text-center">
        <p class="text-sm text-gray-300 drop-shadow-md">계정이 없으신가요? <br class="sm:hidden"><a href="{{ url_for('signup') }}" class="text-yellow-400 hover:text-yellow-300 font-bold ml-1 drop-shadow-md">회원가입하고 5천만원 받기</a></p>
    </div>
</div>

<!-- QR 모달 팝업 등 기타 UI (원본 유지) -->
<div id="qr-modal" class="fixed inset-0 bg-black/80 backdrop-blur-sm hidden flex items-center justify-center z-50 transition-opacity">
    <div class="bg-gray-800 p-8 rounded-3xl shadow-2xl text-center relative max-w-sm w-full mx-4 border border-gray-700">
        <button id="qr-close-btn" class="absolute top-4 right-5 text-gray-400 hover:text-red-400 font-bold text-2xl transition-colors">&times;</button>
        <h3 class="text-white font-bold text-xl mb-6">모바일로 접속하기</h3>
        <div id="qrcode" class="flex justify-center mb-4 p-4 bg-white rounded-xl shadow-inner inline-block mx-auto"></div>
        <p class="text-xs text-blue-400 break-all mb-2 font-mono bg-gray-900/50 p-2 rounded" id="qr-url-text"></p>
    </div>
</div>

<script>
    // 관리자 페이지 배경 설정(랜덤/고정)에 따른 화면 제어
    document.addEventListener("DOMContentLoaded", function() {
        const bgMode = "{{ bg_mode }}";
        const titleEl = document.querySelector('#kitsch-text h1');
        
        // 데이터베이스에 남아있을 수 있는 HTML 태그 찌꺼기를 제거하고 순수 텍스트만 추출
        const textContent = titleEl.innerText.trim();
        
        if (bgMode === 'random') {
            document.body.style.backgroundImage = "url('https://picsum.photos/1920/1080?random=" + new Date().getTime() + "')";
            document.body.style.backgroundSize = "cover";
            document.body.style.backgroundPosition = "center";
            
            // [랜덤 배경] 고급스러운 명조체, 애니메이션 없음, 단색 적용
            titleEl.className = "text-4xl md:text-5xl text-white drop-shadow-2xl text-center tracking-wide font-light whitespace-pre-line";
            titleEl.style.fontFamily = "'Nanum Myeongjo', '궁서', 'Gowun Dodum', serif";
            titleEl.innerText = textContent;
        } else {
            // 빈 문자열을 넣어 base.html에 지정된 기본 테마(로컬 이미지)가 나타나게 처리
            document.body.style.backgroundImage = "";
            
            // [고정 배경] 통통 튀는 애니메이션, 둥근 글꼴 유지
            titleEl.className = "text-4xl md:text-6xl font-black text-yellow-300 drop-shadow-[0_4px_4px_rgba(0,0,0,0.9)] tracking-tighter text-center animate-bounce whitespace-pre-line";
            titleEl.style.fontFamily = "'Comic Sans MS', cursive, sans-serif";
            
            // 텍스트를 줄바꿈 기준으로 나누어 마지막 줄(예: NCC STOCK)만 무지개 그라데이션으로 렌더링
            const lines = textContent.split('\n');
            if (lines.length > 1) {
                const lastLine = lines.pop();
                titleEl.innerHTML = lines.join('<br>') + `<br><span class="text-transparent bg-clip-text bg-[linear-gradient(to_right,#ef4444,#eab308,#22c55e,#3b82f6)] text-6xl md:text-8xl mt-2 block">${lastLine}</span>`;
            } else {
                titleEl.innerHTML = `<span class="text-transparent bg-clip-text bg-[linear-gradient(to_right,#ef4444,#eab308,#22c55e,#3b82f6)] text-6xl md:text-8xl block">${textContent}</span>`;
            }
        }
    });

    // 스피너 제어 스크립트
    document.getElementById('login-form').addEventListener('submit', function(e) {
        if (this.classList.contains('submitting')) {
            e.preventDefault();
            return;
        }
        this.classList.add('submitting');
        
        const btn = document.getElementById('submit-btn');
        btn.disabled = true;
        btn.innerText = "접속 중...";
        btn.classList.add('opacity-70', 'cursor-not-allowed');

        document.getElementById('username').readOnly = true;
        document.getElementById('password').readOnly = true;

        document.getElementById('loading-overlay').classList.remove('hidden');
        document.getElementById('loading-overlay').classList.add('flex');
    });
</script>
{% endblock %}
